/* ── Toast system ───────────────────────────────────── */
function toast(msg, type, duration){
  type = type || 'info';
  duration = duration || 3500;
  let cont = document.getElementById('toast-container');
  if(!cont){
    cont = document.createElement('div');
    cont.id = 'toast-container';
    document.body.appendChild(cont);
  }
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  cont.appendChild(t);
  requestAnimationFrame(function(){ t.classList.add('show'); });
  setTimeout(function(){
    t.classList.remove('show');
    setTimeout(function(){ t.remove(); }, 400);
  }, duration);
}

/* ── Helpers ─────────────────────────────────────────── */
function call(name){
  var args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject){
    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name].apply(null, args);
  });
}
function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g,function(s){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]);}); }
function n(v){ return Number(v)||0; }
function safeParse(v,fb){ try{return JSON.parse(v);}catch(e){return fb;} }
function normText(v){ return String(v==null?'':v).replace(/\u00A0/g,' ').replace(/\s+/g,' ').trim(); }
function debounce_(fn, wait){
  var t = null;
  return function(){
    var args = arguments;
    var ctx = this;
    clearTimeout(t);
    t = setTimeout(function(){ fn.apply(ctx, args); }, wait || 180);
  };
}
function setSession(token,user){ state.sessionToken=token||''; state.user=user||null; localStorage.setItem('encuesta_colab_session',state.sessionToken); }

}
function safeItems(items, label){

/* ── CSV export ─────────────────────────────────────── */
function exportCsv(rows, cols, filename){
  const header = cols.map(function(c){return c.l;}).join(',');
  const lines = rows.map(function(r){
    return cols.map(function(c){
      let v = String(r[c.k]||'');
      if(v.indexOf(',')>-1||v.indexOf('"')>-1||v.indexOf('\n')>-1) v='"'+v.replace(/"/g,'""')+'"';
      return v;
    }).join(',');
  });
  const csv = [header].concat(lines).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

/* ── Copy to clipboard ──────────────────────────────── */
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ toast('Enlace copiado','success'); }).catch(function(){ toast('No se pudo copiar','error'); });
  } else {
    const ta=document.createElement('textarea'); ta.value=text;
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast('Enlace copiado','success'); }catch(_){ toast('No se pudo copiar','error'); }
    document.body.removeChild(ta);
  }
}

function destroyChart(id){ if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];} }
function total(arr){ return (arr||[]).reduce(function(s,x){return s+n(x.value);},0); }

function donut(id, items, colors){
  destroyChart(id);
  const el=document.getElementById(id); if(!el||typeof Chart==='undefined') return;
  const tot=total(items);
  CHARTS[id]=new Chart(el,{
    type:'doughnut',
    data:{
      labels:items.map(function(x){return x.label;}),
      datasets:[{data:items.map(function(x){return n(x.value);}),backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]
    },
    options:{
      maintainAspectRatio: false,
      cutout:'70%',
      plugins:{
        legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:11},color:'#5a7580'}},
        tooltip:{callbacks:{label:function(ctx){
          const pct=tot?Math.round(n(ctx.raw)/tot*100):0;
          return ' '+ctx.label+': '+ctx.raw+' ('+pct+'%)';
        }}},
        datalabels:{
          color:'#fff',
          font:{size:11,weight:'bold'},
          anchor:'center',align:'center',
          formatter:function(value){
            const pct=tot?Math.round(value/tot*100):0;
            return pct>=5?pct+'%':'';
          }
        }
      }
    }
  });
}

function buildMultiDs(multiMap, origLabels, colors){
  if(!multiMap) return [];
  return Object.keys(multiMap).sort().map(function(ed, i) {
    return {
      label: ed,
      data: origLabels.map(function(lbl){ return multiMap[ed][lbl]||0; }),
      backgroundColor: colors[i % colors.length],
      borderRadius: 4
    };
  });
}

const TEAL_GRAD = function(i,nn){return 'hsl('+(173-i*(30/Math.max(nn-1,1)))+','+(79-i*8)+'%,'+(38+i*5)+'%)';};
const AMBER_GRAD = function(i,nn){return 'hsl('+(35+i*(10/Math.max(nn-1,1)))+',80%,'+(35+i*6)+'%)';};
const INDIGO_GRAD = function(i,nn){return 'hsl('+(238+i*(15/Math.max(nn-1,1)))+','+(72-i*5)+'%,'+(40+i*5)+'%)';};

const SURVEY_VIS_DEP_FIELDS = {
  tipo_colaborador:1,
  departamento_procedencia:1,
  pertenece_comunidad_indigena:1,
  combustible_cocina:1,
  trabajaba_antes_paracel:1,
  empresa_contratista:1
};
const SURVEY_PREFILL_FIELDS_ = {
  tipo_colaborador:1, nombre_completo:1, sexo:1,
  cargo:1, area_paracel:1, antiguedad_empresa_banda:1
};

function surveyContextKey_(){
  if(state.token) return state.token;
  if(state.user && state.user.username) return 'preview_' + state.user.username;
  return state.sessionToken ? 'preview_session' : 'anon';
}
function surveyDraftKey_(){ return 'encuesta_colab_draft_'+surveyContextKey_(); }
function surveyStartKey_(){ return 'encuesta_colab_started_at_'+surveyContextKey_(); }
function surveyMount_(view){
  if(view) return view;
  if(state.sessionToken && !state.token){
    return document.getElementById('view') || app;
  }
  return app;
}
function surveySections_(){ return (state.schema && Array.isArray(state.schema.sections)) ? state.schema.sections : []; }
function surveyValues_(){ return state.surveyDraft || {}; }
function saveSurveyDraft_(){ localStorage.setItem(surveyDraftKey_(), JSON.stringify(surveyValues_())); }
function clearSurveyDraft_(){
  localStorage.removeItem(surveyDraftKey_());
  localStorage.removeItem(surveyStartKey_());
  localStorage.removeItem('encuesta_colab_started_at');
  state.surveyDraft = {};
  state.surveyStartedAt = '';
  state.surveySectionIndex = 0;
}
function surveyVisibleQuestions_(section){
  return (section && Array.isArray(section.questions) ? section.questions : []).filter(function(q){
    return !q.visibleIf || evalVis(q.visibleIf, surveyValues_());
  });
}
function surveyMissingForSection_(section){
  return surveyVisibleQuestions_(section).filter(function(q){
    return q.required && !normText(surveyValues_()[q.field]);
  });
}
function syncSurveyDraftFromDom_(scope){
  if(!scope || !scope.querySelectorAll) return;
  if(!state.surveyDraft || typeof state.surveyDraft !== 'object') state.surveyDraft = {};
  var changed = false;
  [].forEach.call(scope.querySelectorAll('[data-field]'), function(el){
    var field = el && el.dataset ? el.dataset.field : '';
    if(!field) return;
    var value = el.value == null ? '' : String(el.value);
    if(state.surveyDraft[field] !== value){
      state.surveyDraft[field] = value;
      changed = true;
    }
  });
  if(changed) saveSurveyDraft_();
}
function surveyProgress_(){
  const sections = surveySections_();
  const total = sections.length || 1;
  const completed = sections.filter(function(sec){ return surveyMissingForSection_(sec).length === 0; }).length;
  return { total: total, completed: completed, pct: Math.round(completed*100/total) };
}
function surveyFieldMeta_(field){
  const map = {
    nombre_completo:{placeholder:'Ej. Juan Perez Gonzalez', full:true, autocomplete:'name'},
    cedula:{placeholder:'Solo numeros, sin puntos', inputmode:'numeric'},
    edad:{placeholder:'Ej. 34', min:'18', max:'80'},
    area_colaborador_indirecto:{placeholder:'Seleccione o escriba el area principal', full:true},
    area_paracel:{placeholder:'Seleccione el area de trabajo en Paracel', full:true},
    empresa_contratista:{placeholder:'Seleccione o escriba la empresa', full:true},
    cargo:{placeholder:'Seleccione o escriba el cargo', full:true},
    distrito_procedencia:{placeholder:'Seleccione o escriba el distrito'},
    distrito_residencia:{placeholder:'Seleccione o escriba el distrito'},
    localidad_procedencia:{placeholder:'Ej. barrio, compania o localidad'},
    localidad_residencia:{placeholder:'Ej. barrio, compania o localidad'},
    pais_origen:{placeholder:'Ej. Brasil, Argentina, Bolivia'},
    combustible_cocina_otro:{placeholder:'Especifique el combustible'},
    n_hijos:{placeholder:'Ej. 2', min:'0', max:'20'},
    personas_hogar:{placeholder:'Ej. 4', min:'1', max:'20'}
  };
  return map[field] || {};
}
function renderSurveyQuestion_(q){
  const meta = surveyFieldMeta_(q.field);
  const val = surveyValues_()[q.field] || '';
  const req = q.required ? ' <span class="req">*</span>' : '';
  const isPrefilled = !!(SURVEY_PREFILL_FIELDS_[q.field] && val && state._prefillApplied);
  const wrapCls = 'survey-field' + (meta.full ? ' full' : '') + (isPrefilled ? ' survey-prefilled' : '');
  const prefillBadge = isPrefilled ? '<span class="survey-prefill-badge" title="Dato precargado del registro de personal">&#128274; Precargado</span>' : '';
  const attr = [
    'data-field="'+esc(q.field)+'"',
    meta.placeholder ? 'placeholder="'+esc(meta.placeholder)+'"' : '',
    meta.inputmode ? 'inputmode="'+esc(meta.inputmode)+'"' : '',
    meta.autocomplete ? 'autocomplete="'+esc(meta.autocomplete)+'"' : '',
    meta.min ? 'min="'+esc(meta.min)+'"' : '',
    meta.max ? 'max="'+esc(meta.max)+'"' : ''
  ].filter(Boolean).join(' ');
  let input = '';
  if(q.type === 'select'){
    input = '<select class="select" '+attr+'><option value=""></option>'+q.options.map(function(o){ return '<option'+(String(val)===String(o)?' selected':'')+'>'+esc(o)+'</option>'; }).join('')+'</select>';
  }else if(q.type === 'select_or_text' || q.type === 'text_or_select'){
    input = '<input list="dl_'+esc(q.field)+'" class="input" value="'+esc(val)+'" '+attr+'>'+
      '<datalist id="dl_'+esc(q.field)+'">'+q.options.map(function(o){ return '<option value="'+esc(o)+'"></option>'; }).join('')+'</datalist>';
  }else if(q.type === 'number'){
    input = '<input class="input" type="number" value="'+esc(val)+'" '+attr+'>';
  }else{
    input = '<input class="input" value="'+esc(val)+'" '+attr+'>';
  }
  return '<div class="'+wrapCls+'" data-visible-if="'+esc(q.visibleIf||'')+'"><label class="label">'+esc(q.label)+req+prefillBadge+'</label>'+input+'</div>';
}

function renderLogin(msg){

      '<div class="card login-card">'+
        '<div style="display:flex; justify-content:center; margin-bottom:16px;">'+
          '<div class="logo">PARACEL</div>'+
        '</div>'+

        '<p class="muted small" style="text-align:center; margin-bottom: 24px;">Encuesta de colaboradores · Panel de administración</p>'+
        (msg?'<div class="callout" style="border-left: 4px solid var(--danger); margin-bottom:14px"><div class="callout-title" style="color:var(--danger); font-size:14px;">Error</div><div class="muted small">'+esc(msg)+'</div></div>':'')+
        '<div class="form-grid" style="grid-template-columns: 1fr;">'+
          '<div class="field">'+
            '<label for="loginUser">Usuario</label>'+
            '<input type="text" id="loginUser" placeholder="Usuario" autocomplete="username" autofocus />'+
          '</div>'+
          '<div class="field">'+
            '<label for="loginPass">Contraseña</label>'+
            '<input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password" />'+
          '</div>'+
        '</div>'+
        '<div class="btn-row mt-16" style="justify-content:center;">'+
          '<button class="btn btn-primary" id="btnLogin" style="width:100%; font-size:16px;">Ingresar al panel</button>'+
        '</div>'+
        '<p class="muted" style="margin-top:14px;font-size:12px;text-align:center;">Los colaboradores acceden mediante enlace único enviado por correo.</p>'+
      '</div>'+
    '</div>';
  const doLogin = function() {
    const btn=document.getElementById('btnLogin');
    btnLoad(btn,'Verificando...');
    call('login',document.getElementById('loginUser').value,document.getElementById('loginPass').value).then(function(res){
      setSession(res.token,res.user); 
      if (res.user.mustChange) {
        state.bootstrap = { user: res.user };
        renderChangePassword();
      } else {
        loadBootstrap();
      }
    }).catch(function(err){ btnReset(btn); renderLogin(err.message||'No fue posible ingresar.'); });
  };
  document.getElementById('btnLogin').onclick=doLogin;
  document.getElementById('loginPass').onkeydown=function(e){if(e.key==='Enter')doLogin();};
}

function renderChangePassword(msg) {
  app.innerHTML=
    '<div class="login-shell">'+
      '<div class="card login-card" style="margin-top:18px">'+
        '<h3 style="margin-bottom:8px; font-weight:800;">Cambio obligatorio de contraseña</h3>'+
        '<p class="muted small" style="margin-bottom:16px;">Por seguridad, debes cambiar tu contraseña inicial antes de continuar.</p>'+
        (msg?'<div class="callout" style="border-left: 4px solid var(--danger); margin-bottom:14px"><div class="callout-title" style="color:var(--danger); font-size:14px;">Error</div><div class="muted small">'+esc(msg)+'</div></div>':'')+
        '<div class="form-grid" style="grid-template-columns: 1fr;">'+
          '<div class="field"><label for="newPass">Nueva Contraseña</label><input id="newPass" type="password"></div>'+
          '<div class="field" style="margin-top:8px;"><button class="btn btn-primary" id="btnChangePass" style="width:100%">Guardar y continuar</button></div>'+
        '</div>'+
      '</div>'+
    '</div>';
    
  const doChange = function() {
    const btn = document.getElementById('btnChangePass');
    const pwd = document.getElementById('newPass').value;
    if(pwd.length < 6) { renderChangePassword('La contraseña debe tener al menos 6 caracteres.'); return; }
    btnLoad(btn, 'Guardando...');
    call('changePassword', state.sessionToken, pwd).then(function(){
      state.user.mustChange = false;
      loadBootstrap();
    }).catch(function(err){
      btnReset(btn);
      renderChangePassword(err.message || 'Error al cambiar contraseña.');
    });
  };
  document.getElementById('btnChangePass').onclick = doChange;
  document.getElementById('newPass').onkeydown = function(e){ if(e.key==='Enter') doChange(); };
}

/* ── Bootstrap ─────────────────────────────────────── */
function loadBootstrap(){
  app.innerHTML='<div class="container"><div class="card"><div class="loading-row"><span class="spinner"></span> Cargando panel...</div></div></div>';
  call('getBootstrap',state.sessionToken).then(function(bs){
    state.bootstrap=bs;
    state.user=bs.user;
    if (state.user.mustChange) {
      renderChangePassword();
    } else {
      state.statsCacheByEdition={};
      state.summaryCache={};
      state.allDashRows=null;
      state.responsesData=null;
      renderPanel();
      // Prefetch filas brutas para filtrado instantáneo (prioridad más alta)
      state.dashFilters = state.dashFilters || {};
      call('getAnalyticRowsForDashboard', state.sessionToken).then(function(rows){
        if(Array.isArray(rows) && rows.length){
          state.allDashRows = rows;
          // Si el tablero ya está visible, forzar re-render para activar modo instantáneo
          if(state.activeTab === 'dashboard'){
            var v = document.getElementById('view');
            if(v) renderDashboard(v);
          }
        }
      }).catch(function(){
        // Fallback: prefetch clásico del summary
        call('getDashboardSummary', state.sessionToken, state.dashFilters).then(function(d){
          state.summaryCache[JSON.stringify(state.dashFilters)] = d;
        }).catch(function(){});
      });
      call('listResponses', state.sessionToken, 500).then(function(r){
        state.responsesData = Array.isArray(r) ? r : [];
      }).catch(function(){});
    }
  }).catch(function(err){ clearSession(); renderLogin(err.message||'Sesión expirada.'); });
}

        '</div>'+
      '</header>'+
      '<aside class="app-nav" id="appNav">'+
        tabs.map(function(t){
          return '<button class="nav-item'+(state.activeTab===t.id?' active':'')+'" data-tab="'+t.id+'">'+
                   '<span class="nav-icon">'+t.icon+'</span><span>'+t.label+'</span>'+

        }).join('')+

      '<main class="app-main" id="view"></main>'+

  document.getElementById('appNav').addEventListener('click',function(e){
    var target = e && e.target ? e.target : null;
    if (target && target.nodeType === 3) target = target.parentElement;
    var btn = null;
    if (target) {
      if (target.closest) {
        btn = target.closest('.nav-item');
      } else {
        var el = target;
        while (el && el !== document.body) {
          if (el.classList && el.classList.contains('nav-item')) { btn = el; break; }
          el = el.parentElement;
        }
      }
    }
    if(!btn) return;
    [].forEach.call(document.querySelectorAll('.nav-item'),function(t){t.classList.remove('active');});
    btn.classList.add('active');
    state.activeTab=btn.dataset.tab;
    renderCurrentTab();
  });
  document.getElementById('btnLogout').onclick=function(){
    call('logout',state.sessionToken).catch(function(){}).then(function(){ clearSession(); renderLogin(); });
  };
  const rb=document.getElementById('btnRebuild');
  if(rb) rb.onclick=function(){
    const self=this;
    btnLoad(self,'↻...');
    call('rebuildAnalytics', state.sessionToken).then(function(){
      state.statsCacheByEdition={};
      state.summaryCache={};
      state.responsesData=null;

      renderCurrentTab();
      btnReset(self);

  };

}

function renderCurrentTab(){
  const view=document.getElementById('view');
  Object.keys(CHARTS).forEach(function(k){destroyChart(k);});
  const tabHandlers={
    dashboard:renderDashboard, responses:renderResponses,
    invitations:renderInvitations, users:renderUsers,
    config:renderConfig, editions:renderEditions,
    survey:function(v){ return renderSurvey(v); }
  };
  const handler=tabHandlers[state.activeTab];
  if(!handler){ view.innerHTML='<div class="card"><p class="muted">Vista no disponible.</p></div>'; return; }
  Promise.resolve(handler(view)).catch(function(err){setTabError(view,err,'No se pudo cargar la vista seleccionada.');});
}

// Utility: programmatic navigation (used by inline onclick handlers)

/* ── Dashboard client-side aggregation ─────────────── */
function isYesLike_j_(v){ var k=normText(v).normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase().replace(/[^A-Z0-9]/g,''); return k==='SI'||k==='YES'||k==='1'||k==='TRUE'; }
function isDirectivo_j_(v){ if(!v) return false; if(isYesLike_j_(v)) return true; var k=normText(v).toUpperCase().replace(/[^A-Z0-9]/g,''); return k==='DIRECTIVO'||k==='DIRECTIVA'||k==='CARGODIRECTIVO'; }
function isFemale_j_(v){ var k=normText(v).toUpperCase().replace(/[^A-Z]/g,''); return k==='F'||k==='MUJER'||k==='FEMENINO'||k==='FEMALE'; }
function isMale_j_(v){ var k=normText(v).toUpperCase().replace(/[^A-Z]/g,''); return k==='M'||k==='HOMBRE'||k==='MASCULINO'||k==='MALE'; }
function classifyCalidad_j_(cq){ var t=normText(cq).toLowerCase(); if(t==='ok') return 'ok'; if(t.indexOf('crit')>-1) return 'critico'; if(t.indexOf('revis')>-1) return 'revisar'; return t||'sin dato'; }
function isIpsAplicable_j_(ip){ var t=normText(ip).toLowerCase(); return t!=='no aplica'&&t!=='no aplica (justificado)'&&t!=='justificado'&&t.indexOf('justificad')===-1&&t!=='inactivo'; }

function applyDashFilters_(rows){
  var f = state.dashFilters;
  if(!f) return rows;
  var hasFilter = f.tipo||f.sexo||f.edadGrupo||f.grupoCargo||f.dept||f.empresa||f.calidad;
  if(!hasFilter) return rows;
  return rows.filter(function(r){
    if(f.tipo && r.tp !== f.tipo) return false;
    if(f.sexo && r.sx !== f.sexo) return false;
    if(f.edadGrupo && r.ag !== f.edadGrupo) return false;
    if(f.grupoCargo && r.gc !== f.grupoCargo) return false;
    if(f.dept && r.dp !== f.dept) return false;
    if(f.empresa && r.em !== f.empresa) return false;
    if(f.calidad && classifyCalidad_j_(r.cq) !== f.calidad) return false;
    return true;
  });
}

function computeDashSummary_(rows){
  var total=0,directos=0,indirectos=0,conIps=0,ipsAplicable=0,calidadOk=0,calidadRevisar=0,calidadCritico=0,edadesSum=0,edadesCount=0,flagsSum=0,directivosTotal=0,directivasTotal=0,directivosHombresTotal=0,last7=0,last30=0,prev30=0,minFecha='',maxFecha='';
  var byEdicionesAll={},byEdicion={},byTipo={},bySexo={},byAreaIndirecto={},byDeptResidencia={},byIpsActual={},bySalario={},byGrupoEdad={},byEstadoCalidad={},byGrupoCargo={},byEmpresaIndirecto={},byMes={},ipsByTipo={},bySexoSalario={};
  var mTipo={},mSexo={},mDept={},mEmpresa={},mSalario={},mCalidad={},mGrupoCargo_={},perEditionAll={};
  var now=new Date(),MS_DAY=86400000;
  var start7=new Date(now-7*MS_DAY),start30=new Date(now-30*MS_DAY),start60=new Date(now-60*MS_DAY);
  function inc_(m,k){m[k]=(m[k]||0)+1;}
  function incM_(m,e,k){if(!m[e])m[e]={};m[e][k]=(m[e][k]||0)+1;}
  function getEdStats_(ed){
    if(!perEditionAll[ed]) perEditionAll[ed]={edicion:ed,total:0,directos:0,indirectos:0,conIps:0,ipsAplicable:0,ok:0,revisar:0,critico:0,edadesSum:0,edadesCount:0,flagsSum:0,directivos:0,directivas:0,directivosHombres:0};
    return perEditionAll[ed];
  }
  rows.forEach(function(r){
    var ed=r.ed||'Sin dato', st=getEdStats_(ed);
    inc_(byEdicionesAll,ed); inc_(byEdicion,ed); st.total++; total++;
    var tp=r.tp||'Sin dato'; inc_(byTipo,tp); incM_(mTipo,ed,tp);
    if(tp==='Directo'){directos++;st.directos++;}
    if(tp==='Indirecto'){indirectos++;st.indirectos++;var ar=r.ar||'Sin dato';inc_(byAreaIndirecto,ar);var em=r.em||'Sin dato';if(em!=='Sin dato'){inc_(byEmpresaIndirecto,em);incM_(mEmpresa,ed,em);}}
    var sx=r.sx||'Sin dato'; inc_(bySexo,sx); incM_(mSexo,ed,sx);
    if(isDirectivo_j_(r.di)){directivosTotal++;st.directivos++;if(isFemale_j_(sx)){directivasTotal++;st.directivas++;}else if(isMale_j_(sx)){directivosHombresTotal++;st.directivosHombres++;}}
    var dp=r.dp||'Sin dato'; inc_(byDeptResidencia,dp); incM_(mDept,ed,dp);
    var ip=r.ip||'Sin dato'; inc_(byIpsActual,ip);
    var isApl=isIpsAplicable_j_(ip);
    if(isApl){ipsAplicable++;st.ipsAplicable++;if(isYesLike_j_(ip)){conIps++;st.conIps++;}}
    if(!ipsByTipo[tp])ipsByTipo[tp]={tipo:tp,conIps:0,sinIps:0,total:0,aplicables:0};
    ipsByTipo[tp].total++;if(isApl){ipsByTipo[tp].aplicables++;if(isYesLike_j_(ip))ipsByTipo[tp].conIps++;else ipsByTipo[tp].sinIps++;}
    var sl=r.sl||'Sin dato'; inc_(bySalario,sl); incM_(mSalario,ed,sl);
    var gc=r.gc||'Sin dato'; if(gc&&gc!=='Sin dato'){ inc_(byGrupoCargo,gc); incM_(mGrupoCargo_,ed,gc); }
    if(sl!=='Sin dato'&&(sx==='Masculino'||sx==='Femenino')){if(!bySexoSalario[sx])bySexoSalario[sx]={};bySexoSalario[sx][sl]=(bySexoSalario[sx][sl]||0)+1;}
    var ag=r.ag||'Sin dato'; inc_(byGrupoEdad,ag);
    var cq=r.cq||'Sin dato'; inc_(byEstadoCalidad,cq);
    var cal=classifyCalidad_j_(cq); incM_(mCalidad,ed,cal);
    if(cal==='ok'){calidadOk++;st.ok++;}else if(cal==='critico'){calidadCritico++;st.critico++;}else if(cal==='revisar'){calidadRevisar++;st.revisar++;}
    var nf=n(r.nf); flagsSum+=nf; st.flagsSum+=nf;
    var ea=n(r.ea); if(ea>=15&&ea<=80){edadesSum+=ea;edadesCount++;st.edadesSum+=ea;st.edadesCount++;}
    var fe=r.fe||''; if(fe){if(!minFecha||fe<minFecha)minFecha=fe;if(!maxFecha||fe>maxFecha)maxFecha=fe;var mk=fe.slice(0,7);if(mk)inc_(byMes,mk);var pts=fe.split('-');if(pts.length===3){var d=new Date(+pts[0],+pts[1]-1,+pts[2]);if(!isNaN(d)){if(d>=start7)last7++;if(d>=start30)last30++;else if(d>=start60)prev30++;}}}
  });
  var delta30=prev30?Math.round((last30-prev30)*100/prev30):(last30?100:0);
  function mapToItems_(m){return Object.keys(m).sort().map(function(k){return{label:k,value:m[k]};});}
  function topItems_(m,lim,excl){excl=excl||[];return mapToItems_(m).filter(function(x){return excl.indexOf(x.label)===-1;}).sort(function(a,b){return b.value-a.value;}).slice(0,lim||10);}
  function salOrd_(s){var ord={'menos del salario mínimo':1,'salario mínimo':2,'más del salario mínimo y hasta 3 millones':3,'más de 3 millones y hasta 5 millones':4,'más de 5 millones y hasta 7 millones':5,'más de 7 millones y hasta 10 millones':6,'más de 10 millones y hasta 13 millones':7,'más de 13 millones y hasta 15 millones':8,'más de 15 millones y hasta 20 millones':9,'más de 20 millones y hasta 30 millones':10,'más de 30 millones':11,'no informa':99};function sk(x){return x.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}return s.sort(function(a,b){return(ord[sk(a.label)]||50)-(ord[sk(b.label)]||50);});}
  function ageOrd_(s){var o={'18-24':1,'25-34':2,'35-44':3,'45-54':4,'55-64':5,'65+':6};return s.sort(function(a,b){return(o[a.label]||99)-(o[b.label]||99);});}
  var serieMes=mapToItems_(byMes).sort(function(a,b){return a.label.localeCompare(b.label);});
  if(serieMes.length>18)serieMes=serieMes.slice(serieMes.length-18);
  var editionStats=Object.keys(perEditionAll).map(function(k){var st=perEditionAll[k];var edP=st.edadesCount?Math.round((st.edadesSum/st.edadesCount)*10)/10:0;var ipsPct=st.ipsAplicable?Math.round(st.conIps*100/st.ipsAplicable):0;var okPct=st.total?Math.round(st.ok*100/st.total):0;var flagsP=st.total?Math.round((st.flagsSum/st.total)*10)/10:0;return{edicion:st.edicion,total:st.total,directos:st.directos,indirectos:st.indirectos,conIps:st.conIps,ipsAplicable:st.ipsAplicable,conIpsPct:ipsPct,calidadOkPct:okPct,edadProm:edP,nFlagsProm:flagsP,ok:st.ok,revisar:st.revisar,critico:st.critico,edadesSum:st.edadesSum,edadesCount:st.edadesCount,flagsSum:st.flagsSum,directivos:st.directivos,directivas:st.directivas,directivosHombres:st.directivosHombres,directivasPct:st.directivos?Math.round(st.directivas*100/st.directivos):0};}).sort(function(a,b){return a.edicion.localeCompare(b.edicion);});
  return{
    edicionesDisponibles:mapToItems_(byEdicionesAll).sort(function(a,b){return a.label.localeCompare(b.label);}),
    total:total,directos:directos,indirectos:indirectos,conIps:conIps,ipsAplicable:ipsAplicable,
    conIpsPct:ipsAplicable?Math.round(conIps*100/ipsAplicable):0,
    edadProm:edadesCount?Math.round((edadesSum/edadesCount)*10)/10:0,
    calidadOkPct:total?Math.round(calidadOk*100/total):0,
    calidadOk:calidadOk,calidadRevisar:calidadRevisar,calidadCritico:calidadCritico,
    nFlagsProm:total?Math.round((flagsSum/total)*10)/10:0,
    directivo:{total:directivosTotal,mujeres:directivasTotal,hombres:directivosHombresTotal,sinDatoSexo:Math.max(directivosTotal-directivasTotal-directivosHombresTotal,0),mujeresPct:directivosTotal?Math.round(directivasTotal*100/directivosTotal):0},
    last7:last7,last30:last30,prev30:prev30,delta30Pct:delta30,
    rangoFechas:{min:minFecha,max:maxFecha},serieMes:serieMes,editionStats:editionStats,
    tipoPorEdicion:editionStats.map(function(s){return{edicion:s.edicion,directos:s.directos,indirectos:s.indirectos,total:s.total};}),
    calidadPorEdicion:editionStats.map(function(s){return{edicion:s.edicion,ok:s.ok,revisar:s.revisar,critico:s.critico,total:s.total};}),
    ipsPorTipo:Object.keys(ipsByTipo).map(function(k){return ipsByTipo[k];}).sort(function(a,b){return a.tipo.localeCompare(b.tipo);}),
    topEmpresasIndirecto:topItems_(byEmpresaIndirecto,12,['Sin dato']),
    porEdicion:mapToItems_(byEdicion).sort(function(a,b){return a.label.localeCompare(b.label);}),
    porTipo:mapToItems_(byTipo),porSexo:mapToItems_(bySexo),porAreaIndirecto:mapToItems_(byAreaIndirecto),
    porDeptResidencia:mapToItems_(byDeptResidencia).sort(function(a,b){return b.value-a.value;}).slice(0,15),
    porIpsActual:mapToItems_(byIpsActual),porSalario:salOrd_(mapToItems_(bySalario)),
    porGrupoEdad:ageOrd_(mapToItems_(byGrupoEdad)),porEstadoCalidad:mapToItems_(byEstadoCalidad),
    porGrupoCargo:mapToItems_(byGrupoCargo).sort(function(a,b){return b.value-a.value;}),
    brechaSalarial:bySexoSalario,
    multi:{tipo:mTipo,sexo:mSexo,dept:mDept,empresa:mEmpresa,salario:mSalario,calidad:mCalidad,grupoCargo:mGrupoCargo_}
  };
}

/* ── DASHBOARD v3 ──────────────────────────────────── */
function renderDashboard(view){
  state.dashboardEditions = state.dashboardEditions || [];
  const edFilters = state.dashboardEditions;
  const editionKey = edFilters.length ? edFilters.slice().sort().join('|') : 'ALL';
  
  state.dashFilters = state.dashFilters || { tipo: '', calidad: '', sexo: '', edadGrupo: '', grupoCargo: '', dept: '', empresa: '' };
  state.summaryCache = state.summaryCache || {};
  const summaryKey = JSON.stringify(state.dashFilters);
  const hasLocal = !!state.allDashRows;
  if (!hasLocal && !state.summaryCache[summaryKey]) {
    view.innerHTML='<div class="card"><div class="loading-row"><span class="spinner"></span> Cargando tablero...</div></div>';
  }
  const loadData = (function(){
    if(hasLocal){
      return Promise.resolve(computeDashSummary_(applyDashFilters_(state.allDashRows)));
    }
    if(state.summaryCache[summaryKey]){
      return Promise.resolve(state.summaryCache[summaryKey]);
    }
    return call('getDashboardSummary', state.sessionToken, state.dashFilters).then(function(d){
      state.summaryCache[summaryKey]=d; return d;
    });
  })();

  function kpiTile(label, value, sub, cls){
    return '<div class="kpi'+(cls?' '+cls:'')+'">'+
      '<div class="kpi-label">'+esc(label)+'</div>'+
      '<div class="kpi-value">'+esc(value)+'</div>'+
      '<div class="muted small mt-8">'+esc(sub||'')+'</div>'+
    '</div>';
  }

  function percent(a,b){ return b?Math.round(a*100/b):0; }

  function renderEditionTable(rows){
    rows = Array.isArray(rows)?rows:[];
    if(!rows.length) return '<p class="muted">Sin datos por edición.</p>';
    return ''+
      '<div class="table-wrap" style="max-height:340px">'+
        '<table class="table">'+
          '<thead><tr>'+
            '<th>Edición <span class="muted" style="font-size:10px">(clic = filtrar)</span></th><th class="right">Total</th><th class="right">Directos</th><th class="right">Indirectos</th><th class="right">IPS % (Aplicables)</th><th class="right">Calidad OK</th><th class="right">% Mujeres en directivos</th><th class="right">Edad prom.</th>'+

                ? (dirPct+'% <span class="muted" style="font-size:11px">('+dirM+'/'+dir+')</span>')

                '<td class="right">'+n(r.indirectos).toLocaleString()+' <span class="muted" style="font-size:11px">('+percent(n(r.indirectos),n(r.total))+'%)</span></td>'+
                '<td class="right">'+n(r.conIpsPct)+'%</td>'+

              '</tr>';
            }).join('')+
          '</tbody>'+
        '</table>'+
      '</div>';
  }

  function renderIpsTipoTable(rows){
    rows = Array.isArray(rows)?rows:[];
    if(!rows.length) return '<p class="muted">Sin datos de IPS por tipo.</p>';
    return ''+
      '<div class="table-wrap" style="max-height:340px">'+
        '<table class="table">'+
          '<thead><tr><th>Tipo <span class="muted" style="font-size:10px">(clic = filtrar)</span></th><th class="right">Con IPS</th><th class="right">Aplicables</th><th class="right">Cobertura %</th></tr></thead>'+
          '<tbody>'+
            rows.map(function(r){
              const app=n(r.aplicables);

                '<td><strong>'+esc(r.tipo)+'</strong></td>'+

                '<td class="right"><strong>'+pct+'%</strong></td>'+
              '</tr>';
            }).join('')+
          '</tbody>'+
        '</table>'+

  function renderTopItemsTable(items, filterKey){
    items = Array.isArray(items)?items:[];
    if(!items.length) return '<p class="muted">Sin datos.</p>';
    const sum=items.reduce(function(acc,x){return acc+n(x.value);},0);

    var clearBtn = document.getElementById('dashClearFilters');
    if(clearBtn) clearBtn.onclick = function(){
      state.dashFilters = { tipo:'', calidad:'', sexo:'', edadGrupo:'', grupoCargo:'', dept:'', empresa:'' };

    document.getElementById('dashExportSummary').onclick=function(){
      const payload = {
        generated_at: new Date().toISOString(),
        filtros: {
          ediciones: edFilters.length ? edFilters.slice() : ['ALL'],
          tipo: state.dashFilters.tipo || '',
          calidad: state.dashFilters.calidad || '',

        },
        kpis: {
          total: total,
          directos: directos,
          indirectos: indirectos,
          cobertura_ips_pct: ipsPct,
          edad_promedio: edadProm,
          mujeres_directivas_pct: directivasPct
        },
        insights: insights
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'dashboard_resumen_'+(new Date().toISOString().slice(0,10))+'.json';
      a.click();
      URL.revokeObjectURL(url);
      toast('Resumen exportado correctamente','success');
    };

    document.getElementById('dashRefresh').onclick=function(){
      const self = this;
      const isAdmin = state.user && state.user.role === 'admin';
      state.responsesData = null;
      function reloadRows_(){
        state.allDashRows = null;
        call('getAnalyticRowsForDashboard', state.sessionToken).then(function(rows){
          if(Array.isArray(rows) && rows.length) state.allDashRows = rows;
        }).catch(function(){});
      }
      if(!isAdmin){
        state.summaryCache = {};
        reloadRows_();
        renderDashboard(view);

      btnLoad(self,'Sincronizando...');
      call('rebuildAnalytics', state.sessionToken).then(function(){
        state.statsCacheByEdition = {};

          if(Array.isArray(rows) && rows.length){
            state.allDashRows = rows;
            var v = document.getElementById('view');
            if(v && state.activeTab === 'dashboard') renderDashboard(v);
          }
        }).catch(function(){});
      }).catch(function(err){
        toast(err.message || String(err),'error');

    requestAnimationFrame(function(){
      const serie=Array.isArray(s.serieMes)?s.serieMes:[];
      vbar('cSerieMes', serie, '#0f766e');

        return edFilters.length === 0 || edFilters.indexOf(x.edicion) > -1;
      });
      stackedBar('cTipoEd',
        te.map(function(x){return x.edicion;}),
        [
          {label:'Directos', data:te.map(function(x){return n(x.directos);}), backgroundColor:'#6366f1'},
          {label:'Indirectos', data:te.map(function(x){return n(x.indirectos);}), backgroundColor:'#0f766e'}
        ]
      );

      const mColors = ['#0f766e', '#6366f1', '#d97706', '#e11d48', '#059669'];
      const deptOrig = aggDept.map(function(x){return x.label;});
      const empOrig = aggEmp.map(function(x){return x.label;});
      const salOrig = aggSalario.map(function(x){return x.label;});
      const salLabels = salOrig.map(shortSalario);

      function subsetMulti(multiMap) {
        if(!multiMap) return {};
        const out = {};
        Object.keys(multiMap).forEach(function(ed){
          if(edFilters.length === 0 || edFilters.indexOf(ed) > -1) out[ed] = multiMap[ed];
        });
        return out;
      }

      if (edFilters.length > 0 && s.multi) {
        multiBar('cDept', deptOrig, buildMultiDs(subsetMulti(s.multi.dept), deptOrig, mColors), {horizontal:true});
        multiBar('cEmp', empOrig, buildMultiDs(subsetMulti(s.multi.empresa), empOrig, mColors), {horizontal:true});
        multiBar('cSal', salLabels, buildMultiDs(subsetMulti(s.multi.salario), salOrig, mColors), {horizontal:true});
      } else {
        hbar('cDept', aggDept, TEAL_GRAD);
        hbar('cEmp', aggEmp, INDIGO_GRAD, {max:undefined});
        const salItems=aggSalario.map(function(x){return {label:shortSalario(x.label),value:x.value};});
        hbar('cSal', salItems, AMBER_GRAD);
      }

      const ce=(Array.isArray(s.calidadPorEdicion)?s.calidadPorEdicion:[]).filter(function(x){
        return edFilters.length === 0 || edFilters.indexOf(x.edicion) > -1;
      });
      stackedBar('cCalEd',
        ce.map(function(x){return x.edicion;}),
        [
          {label:'OK', data:ce.map(function(x){return n(x.ok);}), backgroundColor:'#16a34a'},
          {label:'Revisar', data:ce.map(function(x){return n(x.revisar);}), backgroundColor:'#d97706'},
          {label:'Crítico', data:ce.map(function(x){return n(x.critico);}), backgroundColor:'#dc2626'}
        ]
      );

      donut('cTipo', aggTipo, ['#0f766e','#6366f1','#d97706','#e11d48','#059669']);
      donut('cCalidad', aggCalidad, ['#16a34a','#d97706','#dc2626','#94a3b8']);

      // grupo_cargo chart — aggGrupoCargo computed above (before insights, edition-filtered)
      hbar('cGrupoCargo', aggGrupoCargo, TEAL_GRAD);

      // Cross-filter click handlers — clicking a chart segment filters the dashboard
      function addCrossFilter_(chartId, filterKey, labelFn) {
        var canvas = document.getElementById(chartId);
        if (!canvas) return;
        canvas.style.cursor = 'pointer';
        canvas.onclick = function(evt) {
          var chart = CHARTS[chartId];
          if (!chart) return;
          var type = chart.config && chart.config.type;
          // Use intersect:false so clicking near a bar still registers; nearest works for all types
          var els = chart.getElementsAtEventForMode(evt, 'nearest', {intersect: false}, true);
          if (!els.length) return;
          var label = labelFn ? labelFn(chart, els[0]) : chart.data.labels[els[0].index];
          if (!label) return;
          state.dashFilters[filterKey] = state.dashFilters[filterKey] === label ? '' : label;
          renderDashboard(view);
        };
      }
      addCrossFilter_('cGrupoCargo', 'grupoCargo');
      addCrossFilter_('cDept', 'dept');
      addCrossFilter_('cEmp', 'empresa');
      addCrossFilter_('cTipo', 'tipo');
      addCrossFilter_('cCalidad', 'calidad', function(chart, el) {
        var raw = chart.data.labels[el.index];
        var calMap = {'ok':'ok','revisar':'revisar','critico':'critico','crítico':'critico'};
        return calMap[(raw||'').toLowerCase()] || raw;
      });
      // cBrecha: click on a bar → filter by sexo (Masculino / Femenino)
      addCrossFilter_('cBrecha', 'sexo', function(chart, el) {
        return (chart.data.datasets[el.datasetIndex] || {}).label || '';
      });

      // Table row cross-filter — rows with data-cf-key / data-cf-val
      [].forEach.call(view.querySelectorAll('tr[data-cf-key]'), function(tr) {
        tr.onmouseenter = function(){ this.style.background='rgba(15,118,110,0.07)'; };
        tr.onmouseleave = function(){ this.style.background=''; };
        tr.onclick = function() {
          var key = this.dataset.cfKey;
          var val = this.dataset.cfVal;
          if(!key || !val) return;
          state.dashFilters[key] = state.dashFilters[key] === val ? '' : val;
          renderDashboard(view);
        };
      });
      // Edition table rows — toggle edition filter
      [].forEach.call(view.querySelectorAll('tr[data-cf-ed]'), function(tr) {
        tr.onmouseenter = function(){ this.style.background='rgba(15,118,110,0.07)'; };
        tr.onmouseleave = function(){ this.style.background=''; };
        tr.onclick = function() {
          var val = this.dataset.cfEd;
          if(!val) return;
          var idx = state.dashboardEditions.indexOf(val);
          if(idx > -1) {
            state.dashboardEditions = state.dashboardEditions.filter(function(v){return v!==val;});
          } else {
            state.dashboardEditions.push(val);
          }
          renderDashboard(view);
        };
      });

      // brecha salarial chart
      var brecha = s.brechaSalarial || {};
      var salBands = ['Menos del salario mínimo','Salario mínimo',
        'Más del salario mínimo y hasta 3 millones','Más de 3 millones y hasta 5 millones',
        'Más de 5 millones y hasta 7 millones','Más de 7 millones y hasta 10 millones',
        'Más de 10 millones y hasta 13 millones','Más de 13 millones y hasta 15 millones',
        'Más de 15 millones y hasta 20 millones','Más de 20 millones y hasta 30 millones',
        'Más de 30 millones'];
      var salLabelsBrecha = salBands.map(function(b){
        return b.replace('Menos del salario mínimo','< Mín.').replace('Salario mínimo','1 Mín.')
          .replace('Más del salario mínimo y hasta 3 millones','1-3 M').replace('Más de ','').replace(' millones','M').replace(' y hasta',' -').replace(' millones','M');
      });
      var mData = salBands.map(function(b){ return n((brecha['Masculino']||{})[b]); });
      var fData = salBands.map(function(b){ return n((brecha['Femenino']||{})[b]); });
      multiBar('cBrecha', salLabelsBrecha,
        [{label:'Masculino', data:mData, backgroundColor:'#6366f1', borderRadius:4},
         {label:'Femenino',  data:fData, backgroundColor:'#e11d48', borderRadius:4}],
        {horizontal:true}
      );
    });
  });
}

/* ── RESPUESTAS v2 ─────────────────────────────────── */
function renderResponses(view){
  view.innerHTML='<div class="card"><div class="loading-row"><span class="spinner"></span> Cargando respuestas...</div></div>';

  const doRender = function(rows){
    state.responsesData = rows;
    const cols=[
      {k:'edicion',l:'Edición',s:1},{k:'fecha_encuesta',l:'Fecha',s:1},
      {k:'tipo_colaborador',l:'Tipo',s:1},{k:'sexo',l:'Sexo',s:1},
      {k:'edad',l:'Edad',s:1},{k:'departamento_residencia',l:'Dpto.',s:1},
      {k:'salario_actual_banda',l:'Salario',s:1},{k:'descuento_ips_actual',l:'IPS',s:1},
      {k:'empresa_contratista',l:'Empresa',s:1},{k:'estado_calidad',l:'Calidad',s:1},
      {k:'n_flags',l:'Flags',s:1}
    ];

    if(rows && rows.length){
      var existingKeys = cols.map(function(c){ return c.k; });
      existingKeys.push('respondente_id'); // We add this at the end manually
      Object.keys(rows[0]).forEach(function(k){
        if(existingKeys.indexOf(k) === -1 && k.indexOf('flag_') === -1 && k.indexOf('_raw') === -1 && k !== 'obs'){
          cols.push({k:k, l:k.replace(/_/g,' ').replace(/^./, function(match){return match.toUpperCase();}), s:1});
        }
      });
      cols.push({k:'respondente_id',l:'ID anon.'});
    }

    const PAGE_SIZES = [25, 50, 100, 200];
    state.responsesPageSize = PAGE_SIZES.indexOf(Number(state.responsesPageSize)) > -1 ? Number(state.responsesPageSize) : 50;
    state.responsesPage = Math.max(1, Number(state.responsesPage || 1));

    function normalizeKey_(v){
      return normText(v).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }
    function isFemale_(v){
      var t = normalizeKey_(v);
      return t === 'mujer' || t === 'femenino' || t === 'f';
    }
    function isDirectivo_(v){
      var t = normalizeKey_(v);
      return t === 'si' || t === 'yes' || t === 'true' || t === '1' || t === 'directivo' || t === 'directiva' || t === 'cargo directivo';
    }

    function applyFilters(r){
      const f=state.responsesFilter;
      if(f.tipo        && r.tipo_colaborador!==f.tipo)                     return false;
      if(f.calidad     && r.estado_calidad!==f.calidad)                    return false;
      if(f.sexo        && normalizeKey_(r.sexo)!==normalizeKey_(f.sexo))   return false;
      if(f.edadGrupo   && r.edad_grupo!==f.edadGrupo)                      return false;
      if(f.deptResidencia && normalizeKey_(r.departamento_residencia)!==normalizeKey_(f.deptResidencia)) return false;
      if(f.grupoCargo  && normalizeKey_(r.grupo_cargo)!==normalizeKey_(f.grupoCargo)) return false;
      if(f.empresa     && normalizeKey_(r.empresa_contratista)!==normalizeKey_(f.empresa)) return false;
      if(f.edicion     && normalizeKey_(r.edicion)!==normalizeKey_(f.edicion)) return false;
      if(f.search){
        const q=normalizeKey_(f.search);
        return cols.some(function(c){ return normalizeKey_(String(r[c.k]||'')).indexOf(q)>-1; });
      }
      return true;
    }
    function applySort(arr){
      const sc=state.responsesSort;
      if(!sc.col) return arr;
      return arr.slice().sort(function(a,b){
        var av = a[sc.col];
        var bv = b[sc.col];
        var an = Number(av);
        var bn = Number(bv);
        if(!isNaN(an) && !isNaN(bn) && normText(av) !== '' && normText(bv) !== ''){
          return (an - bn) * sc.dir;
        }
        return String(av||'').localeCompare(String(bv||''), 'es', {numeric:true, sensitivity:'base'}) * sc.dir;
      });
    }
    let rowsCacheKey = '';
    let rowsCacheValue = [];
    function getRows(){
      const sc = state.responsesSort;
      const f = state.responsesFilter || {};
      const key = [rows.length, f.search||'', f.tipo||'', f.calidad||'', f.sexo||'', f.edadGrupo||'', f.deptResidencia||'', f.grupoCargo||'', f.empresa||'', f.edicion||'', sc.col||'', sc.dir||1].join('|');
      if(key === rowsCacheKey) return rowsCacheValue;
      rowsCacheValue = applySort(rows.filter(applyFilters));
      rowsCacheKey = key;
      return rowsCacheValue;
    }

    function renderTable(){
      const filtered=getRows();
      const pageSize = Number(state.responsesPageSize) || 50;
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      if(state.responsesPage > totalPages) state.responsesPage = totalPages;
      if(state.responsesPage < 1) state.responsesPage = 1;
      const pageFrom = filtered.length ? ((state.responsesPage - 1) * pageSize + 1) : 0;
      const pageTo = Math.min(filtered.length, state.responsesPage * pageSize);
      const pageRows = filtered.slice(pageFrom ? pageFrom - 1 : 0, pageTo);
      const ct=document.getElementById('respCount');
      if(ct) ct.textContent=filtered.length+' de '+rows.length;
      const pi=document.getElementById('respPageInfo');
      if(pi) pi.textContent = filtered.length ? ('Mostrando '+pageFrom+'-'+pageTo+' de '+filtered.length+' filtradas') : 'Sin resultados para los filtros actuales';
      const pb=document.getElementById('respPageBadge');
      if(pb) pb.textContent = state.responsesPage+' / '+totalPages;
      const stats = { ok: 0, revisar: 0, critico: 0, directivos: 0, directivas: 0 };
      filtered.forEach(function(r){
        const cal = normalizeKey_(r.estado_calidad);
        if(cal === 'ok') stats.ok++;
        else if(cal.indexOf('revis') > -1) stats.revisar++;
        else if(cal.indexOf('crit') > -1) stats.critico++;
        if(isDirectivo_(r.es_cargo_directivo)){
          stats.directivos++;
          if(isFemale_(r.sexo)) stats.directivas++;
        }
      });
      const directivasPct = stats.directivos ? Math.round(stats.directivas * 100 / stats.directivos) : 0;
      const statEl = document.getElementById('respStatsQuick');
      if(statEl){
        statEl.innerHTML =
          '<span class="badge info">OK: '+stats.ok+'</span>'+
          '<span class="badge warn">Revisar: '+stats.revisar+'</span>'+
          '<span class="badge danger">Critico: '+stats.critico+'</span>'+
          '<span class="badge muted">% mujeres directivas: '+directivasPct+'%</span>';
      }
      const tbody=document.getElementById('respTbody');
      if(!tbody) return;
      tbody.innerHTML=pageRows.length ? pageRows.map(function(r){
        return '<tr>'+cols.map(function(c){
          if(c.k==='estado_calidad') return '<td>'+statusBadge(r[c.k])+'</td>';
          if(c.k==='n_flags') return '<td>'+(n(r[c.k])>0?'<span class="badge '+(n(r[c.k])>=3?'danger':'warn')+'">'+r[c.k]+'</span>':r[c.k])+'</td>';
          if(c.k==='descuento_ips_actual') return '<td>'+statusBadge(r[c.k])+'</td>';
          if(c.k==='salario_actual_banda') return '<td style="font-size:11px">'+esc(shortSalario(r[c.k]||''))+'</td>';
          if(c.k==='respondente_id') return '<td class="code">'+esc(String(r[c.k]||'').slice(0,12))+'...</td>';
          if(c.k==='es_cargo_directivo') return '<td>'+statusBadge(r[c.k])+'</td>';
          return '<td>'+esc(r[c.k])+'</td>';
        }).join('')+'</tr>';
      }).join('') : '<tr><td colspan="'+cols.length+'" style="text-align:center;padding:24px" class="muted">Sin resultados para los filtros aplicados.</td></tr>';

      [].forEach.call(view.querySelectorAll('th.sortable'),function(th){
        th.classList.remove('sort-asc','sort-desc');
        if(th.dataset.col===state.responsesSort.col)
          th.classList.add(state.responsesSort.dir===1?'sort-asc':'sort-desc');
      });
      const prevBtn = document.getElementById('respPrev');
      const nextBtn = document.getElementById('respNext');
      if(prevBtn) prevBtn.disabled = state.responsesPage <= 1;
      if(nextBtn) nextBtn.disabled = state.responsesPage >= totalPages;
    }

    function uniq_(arr){ var s={}; return arr.filter(function(v){ if(!v||s[v]) return false; s[v]=1; return true; }).sort(); }
    const tipos       = uniq_(rows.map(function(r){return r.tipo_colaborador;}));
    const calidades   = uniq_(rows.map(function(r){return r.estado_calidad;}));
    const sexos       = uniq_(rows.map(function(r){return r.sexo;}));
    const edadGrupos  = ['18-24','25-34','35-44','45-54','55-64','65+'].filter(function(g){ return rows.some(function(r){return r.edad_grupo===g;}); });
    const deptos      = uniq_(rows.map(function(r){return r.departamento_residencia;})).slice(0,25);
    const grupoCargos = uniq_(rows.map(function(r){return r.grupo_cargo;}));
    const empresas    = (function(){ var cnt={}; rows.forEach(function(r){ var e=r.empresa_contratista; if(e) cnt[e]=(cnt[e]||0)+1; }); return Object.keys(cnt).sort(function(a,b){return cnt[b]-cnt[a];}).slice(0,20); })();
    const ediciones   = uniq_(rows.map(function(r){return r.edicion;}));

    function sel_(id, label, opts, cur){
      return '<select class="select filter-sel" id="'+id+'">'+
        '<option value="">'+label+'</option>'+
        opts.map(function(v){ return '<option value="'+esc(v)+'"'+(cur===v?' selected':'')+'>'+esc(v)+'</option>'; }).join('')+
      '</select>';
    }

    const f = state.responsesFilter;
    view.innerHTML=
      '<div class="card">'+
        '<div class="spread" style="margin-bottom:10px">'+
          '<div>'+
            '<h3 style="margin-bottom:2px">Base analítica — vista anonimizada</h3>'+
            '<p class="muted" style="font-size:12px">'+rows.length+' registros · filtros múltiples · exportación CSV</p>'+
          '</div>'+
          '<div class="row">'+
            '<span class="badge info" id="respCount">'+rows.length+'</span>'+
            '<button class="btn btn-secondary" id="btnExportRespPage">⬇ Pág.</button>'+
            '<button class="btn btn-secondary" id="btnExportResp">⬇ Filtrado</button>'+
            '<button class="btn btn-ghost" id="btnRefreshResp">↻</button>'+
          '</div>'+
        '</div>'+
        '<div class="row" id="respStatsQuick" style="margin-bottom:10px; gap:6px; flex-wrap:wrap;"></div>'+

        '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; align-items:center;">'+
          '<input class="input search-input" id="respSearch" placeholder="Buscar en todos los campos..." style="flex:1; min-width:180px;" value="'+esc(f.search)+'">'+
          sel_('respEdicion',  'Todas las ediciones', ediciones,   f.edicion)+
          sel_('respTipo',     'Todos los tipos',     tipos,       f.tipo)+
          sel_('respSexo',     'Todos los sexos',     sexos,       f.sexo)+
          sel_('respEdadGrupo','Todos los tramos',    edadGrupos,  f.edadGrupo)+
        '</div>'+
        '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; align-items:center;">'+
          sel_('respGrupoCargo','Todas las categorías',  grupoCargos, f.grupoCargo)+
          sel_('respDepto',    'Todos los dptos.',    deptos,      f.deptResidencia)+
          sel_('respEmpresa',  'Todas las empresas',  empresas,    f.empresa)+
          sel_('respCalidad',  'Toda calidad',        calidades,   f.calidad)+
          '<select class="select filter-sel" id="respPageSize">'+
            PAGE_SIZES.map(function(sz){ return '<option value="'+sz+'"'+(state.responsesPageSize===sz?' selected':'')+'>'+sz+' / pág.</option>'; }).join('')+
          '</select>'+
          '<button class="btn btn-ghost" id="btnClearFilter">Limpiar filtros</button>'+
        '</div>'+
        '<div class="table-wrap">'+
          '<table class="table" id="respTable">'+
            '<thead><tr>'+
              cols.map(function(c){return c.s?'<th class="sortable" data-col="'+esc(c.k)+'">'+esc(c.l)+'</th>':'<th>'+esc(c.l)+'</th>';}).join('')+
            '</tr></thead>'+
            '<tbody id="respTbody"></tbody>'+
          '</table>'+
        '</div>'+
        '<div class="table-pager">'+
          '<div class="muted small" id="respPageInfo">-</div>'+
          '<div class="row">'+
            '<button class="btn btn-ghost" id="respPrev">Anterior</button>'+
            '<span class="badge info" id="respPageBadge">1 / 1</span>'+
            '<button class="btn btn-ghost" id="respNext">Siguiente</button>'+
          '</div>'+
        '</div>'+
      '</div>';

    renderTable();

    document.getElementById('respSearch').addEventListener('input', debounce_(function(e){
      state.responsesFilter.search=e.target.value;
      state.responsesPage = 1;
      renderTable();
    }, 160));
    var filterMap_ = [
      ['respTipo',      'tipo'],
      ['respCalidad',   'calidad'],
      ['respSexo',      'sexo'],
      ['respEdadGrupo', 'edadGrupo'],
      ['respDepto',     'deptResidencia'],
      ['respGrupoCargo','grupoCargo'],
      ['respEmpresa',   'empresa'],
      ['respEdicion',   'edicion']
    ];
    filterMap_.forEach(function(pair){
      var el = document.getElementById(pair[0]);
      if(el) el.onchange = function(e){
        state.responsesFilter[pair[1]] = e.target.value;
        state.responsesPage = 1;
        renderTable();
      };
    });
    document.getElementById('respPageSize').onchange=function(e){
      state.responsesPageSize = Number(e.target.value) || 50;
      state.responsesPage = 1;
      renderTable();
    };
    document.getElementById('btnClearFilter').onclick=function(){
      state.responsesFilter={search:'',tipo:'',calidad:'',sexo:'',edadGrupo:'',deptResidencia:'',grupoCargo:'',empresa:'',edicion:''};
      state.responsesPage = 1;
      document.getElementById('respSearch').value='';
      filterMap_.forEach(function(pair){ var el=document.getElementById(pair[0]); if(el) el.value=''; });
      document.getElementById('respPageSize').value=String(state.responsesPageSize);
      renderTable();
    };
    [].forEach.call(view.querySelectorAll('th.sortable'),function(th){
      th.onclick=function(){
        const col=this.dataset.col;
        if(state.responsesSort.col===col){ state.responsesSort.dir*=-1; }
        else{ state.responsesSort.col=col; state.responsesSort.dir=1; }
        state.responsesPage = 1;
        renderTable();
      };
    });
    document.getElementById('respPrev').onclick=function(){
      state.responsesPage = Math.max(1, state.responsesPage - 1);
      renderTable();
    };
    document.getElementById('respNext').onclick=function(){
      state.responsesPage = state.responsesPage + 1;
      renderTable();
    };
    document.getElementById('btnExportResp').onclick=function(){
      const filtered=getRows();
      exportCsv(filtered, cols.map(function(c){return {k:c.k,l:c.l};}), 'respuestas_analitica.csv');
      toast('CSV exportado: '+filtered.length+' registros','success');
    };
    document.getElementById('btnExportRespPage').onclick=function(){
      const filtered=getRows();
      const pageSize = Number(state.responsesPageSize) || 50;
      const from = (state.responsesPage - 1) * pageSize;
      const pageRows = filtered.slice(from, from + pageSize);
      exportCsv(pageRows, cols.map(function(c){return {k:c.k,l:c.l};}), 'respuestas_pagina_'+state.responsesPage+'.csv');
      toast('CSV de pagina exportado: '+pageRows.length+' registros','success');
    };
    document.getElementById('btnRefreshResp').onclick=function(){
      const self = this;
      btnLoad(self,'Recargando...');
      state.responsesData = null;
      call('listResponses',state.sessionToken,500).then(function(rowsRaw){
        doRender(Array.isArray(rowsRaw)?rowsRaw:[]);
      }).catch(function(err){
        toast(err.message||String(err),'error');
        btnReset(self);
      });
    };
  };

  // Fast path: use allDashRows (already in memory, compact → full field mapping)
  if(state.allDashRows && state.allDashRows.length) {
    doRender(state.allDashRows.map(function(r){
      return {
        edicion: r.ed, fecha_encuesta: r.fe, tipo_colaborador: r.tp,
        sexo: r.sx, edad: r.ea, edad_grupo: r.ag,
        departamento_residencia: r.dp, descuento_ips_actual: r.ip,
        salario_actual_banda: r.sl, empresa_contratista: r.em,
        estado_calidad: r.cq, n_flags: r.nf, grupo_cargo: r.gc,
        es_cargo_directivo: r.di, area_colaborador_indirecto: r.ar
      };
    }));
    return Promise.resolve();
  }
  if(state.responsesData){
    doRender(state.responsesData);
    return Promise.resolve();
  }
  return call('listResponses',state.sessionToken,500).then(function(rowsRaw){
    doRender(Array.isArray(rowsRaw)?rowsRaw:[]);
  }).catch(function(err){
    view.innerHTML='<div class="card"><div class="alert alert-danger">Error cargando respuestas: '+esc(err.message||String(err))+'</div></div>';
  });
}

/* ── INVITACIONES v2 ───────────────────────────────── */
function renderInvitations(view){
  view.innerHTML='<div class="card"><div class="loading-row"><span class="spinner"></span> Cargando...</div></div>';
  return call('listInvitations',state.sessionToken,1000).then(function(rowsRaw){
    const rows=Array.isArray(rowsRaw)?rowsRaw:[];
    const cnt={generado:0,enviado:0,abierto:0,usado:0,total:rows.length};
    rows.forEach(function(r){
      const e=String(r.estado||'').toLowerCase();
      if(e==='generado')cnt.generado++;
      else if(e==='enviado')cnt.enviado++;
      else if(e==='abierto')cnt.abierto++;
      else if(e==='usado')cnt.usado++;
    });

    let filtroEstado='';
    function getFiltered(){ return filtroEstado?rows.filter(function(r){return r.estado===filtroEstado;}):rows; }

    function renderInvTable(){
      const filtered=getFiltered();
      const ct=document.getElementById('invCount'); if(ct) ct.textContent=filtered.length+' de '+rows.length;
      const tb=document.getElementById('invTbody'); if(!tb) return;
      tb.innerHTML=filtered.length?filtered.map(function(r){
        return '<tr>'+
          '<td>'+esc(r.edition_id)+'</td>'+
          '<td>'+esc(r.email)+'</td>'+
          '<td>'+statusBadge(r.estado)+'</td>'+
          '<td style="font-size:11px">'+esc(r.sent_at||'—')+'</td>'+
          '<td style="font-size:11px">'+esc(r.opened_at||'—')+'</td>'+
          '<td style="font-size:11px">'+esc(r.used_at||'—')+'</td>'+
          '<td>'+(r.url_encuesta?'<button class="btn btn-ghost btn-small" onclick="window._copyInv(\''+esc(r.url_encuesta||'')+'\')">📋 Copiar</button>':'<span class="muted">—</span>')+'</td>'+
        '</tr>';
      }).join('') : '<tr><td colspan="7" style="text-align:center;padding:24px" class="muted">Sin registros para este filtro.</td></tr>';
    }

    view.innerHTML=
      '<div class="grid cols-2" style="margin-bottom:18px">'+
        '<div class="card">'+
          '<h3>Generar y enviar invitaciones</h3>'+
          '<div class="form-grid">'+
            '<div><label class="label">Edición</label><input class="input" id="invEdition" value="'+esc(state.bootstrap.activeEdition)+'"></div>'+
            '<div><label class="label">Tipo de acceso</label><select class="select" id="invTipo"><option value="respondent">Respondente</option></select></div>'+
            '<div class="full"><label class="label">Correos (uno por línea o separados por coma)</label><textarea class="textarea" id="invEmails" placeholder="correo1@empresa.com&#10;correo2@empresa.com"></textarea></div>'+
            '<div class="full row">'+
              '<button class="btn btn-secondary" id="btnGenInv">Generar tokens</button>'+
              '<button class="btn" id="btnSendInv">Generar y enviar correos</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="card">'+
          '<h3>Resumen del canal</h3>'+
          '<div class="stats-row" style="grid-template-columns:repeat(2,1fr)">'+
            '<div class="stat-card c-teal" style="cursor:pointer" id="btnFiltroAll"><div class="stat-v">'+cnt.total+'</div><div class="stat-l">Total</div></div>'+
            '<div class="stat-card c-indigo" style="cursor:pointer" id="btnFiltroEnviado"><div class="stat-v">'+cnt.enviado+'</div><div class="stat-l">Enviadas</div></div>'+
            '<div class="stat-card c-amber" style="cursor:pointer" id="btnFiltroAbierto"><div class="stat-v">'+cnt.abierto+'</div><div class="stat-l">Abiertas</div></div>'+
            '<div class="stat-card c-emerald" style="cursor:pointer" id="btnFiltroUsado"><div class="stat-v">'+cnt.usado+'</div><div class="stat-l">Usadas</div></div>'+
          '</div>'+
          '<p class="muted" style="margin-top:10px;font-size:11px">Haz clic en un estado para filtrar la tabla.</p>'+
        '</div>'+
      '</div>'+

      /* ── Importar desde Nómina ── */
      '<div class="card" style="margin-bottom:18px">'+
        '<div class="spread" style="margin-bottom:12px">'+
          '<div>'+
            '<h3 style="margin-bottom:2px">Importar desde Nómina 2026</h3>'+
            '<p class="muted small">Genera invitaciones para los colaboradores directos de Paracel. Al completar el cuestionario, la cédula precarga sus datos laborales automáticamente.</p>'+
          '</div>'+
          '<button class="btn btn-secondary" id="btnCargarNomina">Cargar contactos</button>'+
        '</div>'+
        '<div id="nominaPanel"></div>'+
      '</div>'+

      '<div class="card">'+
        '<div class="spread" style="margin-bottom:12px">'+
          '<h3 style="margin-bottom:0">Historial de invitaciones</h3>'+
          '<div class="row">'+
            '<span class="badge info" id="invCount">'+rows.length+' registros</span>'+
            '<select class="select" id="invFiltro" style="width:auto">'+
              '<option value="">Todos los estados</option>'+
              '<option value="Generado">Generado</option>'+
              '<option value="Enviado">Enviado</option>'+
              '<option value="Abierto">Abierto</option>'+
              '<option value="Usado">Usado</option>'+
            '</select>'+
          '</div>'+
        '</div>'+
        '<div class="table-wrap">'+
          '<table>'+
            '<thead><tr><th>Edición</th><th>Email</th><th>Estado</th><th>Enviado</th><th>Abierto</th><th>Usado</th><th>Acción</th></tr></thead>'+
            '<tbody id="invTbody"></tbody>'+
          '</table>'+
        '</div>'+
      '</div>';

    renderInvTable();

    const setFiltro=function(v){
      filtroEstado=v;
      const sel=document.getElementById('invFiltro'); if(sel) sel.value=v;
      renderInvTable();
    };
    document.getElementById('invFiltro').onchange=function(e){ filtroEstado=e.target.value; renderInvTable(); };
    document.getElementById('btnFiltroAll').onclick=function(){ setFiltro(''); };
    document.getElementById('btnFiltroEnviado').onclick=function(){ setFiltro('Enviado'); };
    document.getElementById('btnFiltroAbierto').onclick=function(){ setFiltro('Abierto'); };
    document.getElementById('btnFiltroUsado').onclick=function(){ setFiltro('Usado'); };

    const invAction=function(fn, btn){
      const data={
        edition_id:document.getElementById('invEdition').value,
        tipo_acceso:document.getElementById('invTipo').value,
        emails:document.getElementById('invEmails').value
      };
      if(!data.emails.trim()){ toast('Ingrese al menos un correo.','error'); return; }
      btnLoad(btn, fn==='sendInvitations'?'Enviando correos...':'Generando tokens...');
      call(fn,state.sessionToken,data).then(function(res){
        toast(fn==='sendInvitations'?'Enviados '+(res.total||'')+ ' correos correctamente':'Tokens generados correctamente','success');
        renderInvitations(view);
      }).catch(function(err){ toast(err.message||String(err),'error'); btnReset(btn); });
    };
    document.getElementById('btnGenInv').onclick=function(){ invAction('createInvitations',this); };
    document.getElementById('btnSendInv').onclick=function(){ invAction('sendInvitations',this); };

    /* ── Panel Nómina ── */
    var nominaContacts = [];
    document.getElementById('btnCargarNomina').onclick = function(){
      const btn = this;
      btnLoad(btn, 'Cargando...');
      call('listNomina', state.sessionToken).then(function(contactos){
        nominaContacts = Array.isArray(contactos) ? contactos : [];
        btnReset(btn);
        renderNominaPanel_();
      }).catch(function(err){
        toast(err.message||String(err), 'error');
        btnReset(btn);
      });
    };

    function renderNominaPanel_(){
      const panel = document.getElementById('nominaPanel');
      if (!panel) return;
      var searchVal = '';
      var selectedCedulas = new Set(nominaContacts.map(function(c){ return c.cedula; }));

      function getFiltered(){
        return nominaContacts.filter(function(c){
          if (!searchVal) return true;
          var q = searchVal.toLowerCase();
          return (c.nombre_completo||'').toLowerCase().indexOf(q) > -1 ||
                 (c.email||'').toLowerCase().indexOf(q) > -1 ||
                 (c.cargo||'').toLowerCase().indexOf(q) > -1 ||
                 (c.area||'').toLowerCase().indexOf(q) > -1 ||
                 (c.cedula||'').indexOf(q) > -1;
        });
      }

      function renderTable(){
        const filtered = getFiltered();
        const allChecked = filtered.every(function(c){ return selectedCedulas.has(c.cedula); });
        const selCount = filtered.filter(function(c){ return selectedCedulas.has(c.cedula); }).length;
        panel.innerHTML =
          '<div class="row" style="margin-bottom:10px;flex-wrap:wrap;gap:8px">'+
            '<input class="input" id="nominaSearch" placeholder="Buscar por nombre, email, cargo o área..." value="'+esc(searchVal)+'" style="flex:1;min-width:220px">'+
            '<span class="badge info">'+selCount+' seleccionados de '+nominaContacts.length+'</span>'+
            '<input class="input" id="nominaEdition" value="'+esc(state.bootstrap.activeEdition)+'" style="width:80px" title="Edición">'+
            '<button class="btn btn-secondary" id="btnNominaGenerar">Generar tokens</button>'+
            '<button class="btn" id="btnNominaEnviar">Generar y enviar correos</button>'+
          '</div>'+
          '<div class="table-wrap" style="max-height:320px;overflow-y:auto">'+
            '<table>'+
              '<thead><tr>'+
                '<th><input type="checkbox" id="nominaChkAll" '+(allChecked?'checked':'')+' title="Seleccionar todos"></th>'+
                '<th>Cédula</th><th>Nombre</th><th>Cargo</th><th>Área</th><th>Email</th>'+
              '</tr></thead>'+
              '<tbody>'+
              filtered.map(function(c){
                const chk = selectedCedulas.has(c.cedula) ? ' checked' : '';
                return '<tr>'+
                  '<td><input type="checkbox" class="nomina-chk" data-cedula="'+esc(c.cedula)+'"'+chk+'></td>'+
                  '<td>'+esc(c.cedula)+'</td>'+
                  '<td>'+esc(c.nombre_completo)+'</td>'+
                  '<td style="font-size:11px">'+esc(c.cargo)+'</td>'+
                  '<td style="font-size:11px">'+esc(c.area)+'</td>'+
                  '<td style="font-size:11px">'+esc(c.email)+'</td>'+
                '</tr>';
              }).join('')+
              '</tbody>'+
            '</table>'+
          '</div>';

        document.getElementById('nominaSearch').oninput = function(){
          searchVal = this.value;
          renderTable();
        };
        document.getElementById('nominaChkAll').onchange = function(){
          var filtered2 = getFiltered();
          if (this.checked) filtered2.forEach(function(c){ selectedCedulas.add(c.cedula); });
          else filtered2.forEach(function(c){ selectedCedulas.delete(c.cedula); });
          renderTable();
        };
        [].forEach.call(panel.querySelectorAll('.nomina-chk'), function(chk){
          chk.onchange = function(){
            if (this.checked) selectedCedulas.add(this.dataset.cedula);
            else selectedCedulas.delete(this.dataset.cedula);
            renderTable();
          };
        });

        const nominaAction = function(fn, btn){
          const edition = (document.getElementById('nominaEdition')||{}).value || state.bootstrap.activeEdition;
          const cedulas = Array.from(selectedCedulas);
          if (!cedulas.length){ toast('Seleccione al menos un contacto.','error'); return; }
          btnLoad(btn, fn==='sendInvitationsFromNomina'?'Enviando...':'Generando tokens...');
          call(fn, state.sessionToken, { edition_id: edition, cedulas: cedulas }).then(function(res){
            const msg = 'Creados: '+(res.created||0)+' · Omitidos: '+(res.skipped||0)+(res.sent!=null?' · Enviados: '+res.sent:'');
            toast(msg, 'success', 5000);
            renderInvitations(view);
          }).catch(function(err){ toast(err.message||String(err),'error'); btnReset(btn); });
        };
        document.getElementById('btnNominaGenerar').onclick = function(){ nominaAction('createInvitationsFromNomina', this); };
        document.getElementById('btnNominaEnviar').onclick  = function(){ nominaAction('sendInvitationsFromNomina',  this); };
      }

      renderTable();
    }
  });
}

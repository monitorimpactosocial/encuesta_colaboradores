<script>
(function(){
'use strict';

/* ── Estado global ──────────────────────────────────── */
const state = {
  sessionToken: localStorage.getItem('encuesta_colab_session') || '',
  user: null,
  bootstrap: null,
  statsCache: null,
  schema: null,
  token: (window.SERVER_CONTEXT && window.SERVER_CONTEXT.token) || '',
  surveyStartedAt: localStorage.getItem('encuesta_colab_started_at') || '',
  activeTab: 'dashboard'
};
const CHARTS = {};   // instancias Chart.js activas
const app = document.getElementById('app');

/* ── Helpers base ──────────────────────────────────── */
function call(name, ...args){
  return new Promise((resolve, reject) => {
    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[name](...args);
  });
}
function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function n(v){ return Number(v)||0; }
function safeParse(v,fb){ try{return JSON.parse(v);}catch(e){return fb;} }
function setSession(token,user){ state.sessionToken=token||''; state.user=user||null; localStorage.setItem('encuesta_colab_session',state.sessionToken); }
function clearSession(){ state.sessionToken=''; state.user=null; localStorage.removeItem('encuesta_colab_session'); }
function statusBadge(v){
  const t=String(v||'');
  const cls=t==='OK'||t==='Abierta'||t==='Usado'?'ok':t==='Crítico'||t==='Anulado'?'danger':t==='Revisar'||t==='Enviado'||t==='Generado'?'warn':'muted';
  return `<span class="badge ${cls}">${esc(t)}</span>`;
}

/* ── Chart helpers ─────────────────────────────────── */
function destroyChart(id){ if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];} }
function total(arr){ return (arr||[]).reduce((s,x)=>s+n(x.value),0); }

function donut(id, items, colors){
  destroyChart(id);
  const el=document.getElementById(id); if(!el||typeof Chart==='undefined') return;
  const tot=total(items);
  CHARTS[id]=new Chart(el,{
    type:'doughnut',
    data:{
      labels:items.map(x=>x.label),
      datasets:[{data:items.map(x=>n(x.value)),backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]
    },
    options:{
      cutout:'70%',
      plugins:{
        legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:11},color:'#5a7580'}},
        tooltip:{callbacks:{label:ctx=>{
          const pct=tot?Math.round(n(ctx.raw)/tot*100):0;
          return ` ${ctx.label}: ${ctx.raw} (${pct}%)`;
        }}}
      }
    }
  });
}

function hbar(id, items, colorFn, opts){
  destroyChart(id);
  const el=document.getElementById(id); if(!el||typeof Chart==='undefined') return;
  const labels=items.map(x=>x.label);
  const data=items.map(x=>n(x.value));
  const max=Math.max(...data)||1;
  CHARTS[id]=new Chart(el,{
    type:'bar',
    data:{
      labels,
      datasets:[{
        data,
        backgroundColor: typeof colorFn==='function' ? data.map((_,i)=>colorFn(i,data.length)) : (colorFn||'#0f766e'),
        borderRadius:6,
        borderSkipped:false
      }]
    },
    options:{
      indexAxis:'y',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>{
          const pct=total(items)?Math.round(n(ctx.raw)/total(items)*100):0;
          return ` ${ctx.raw} (${pct}%)`;
        }}}
      },
      scales:{
        x:{grid:{color:'#edf5f3'},ticks:{font:{size:10},color:'#5a7580'},max: opts&&opts.max?opts.max:undefined},
        y:{grid:{display:false},ticks:{font:{size:11},color:'#0f2027'}}
      }
    }
  });
}

function vbar(id, items, colors){
  destroyChart(id);
  const el=document.getElementById(id); if(!el||typeof Chart==='undefined') return;
  CHARTS[id]=new Chart(el,{
    type:'bar',
    data:{
      labels:items.map(x=>x.label),
      datasets:[{data:items.map(x=>n(x.value)),backgroundColor:colors||'#0f766e',borderRadius:8,borderSkipped:false}]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:12},color:'#0f2027'}},
        y:{grid:{color:'#edf5f3'},ticks:{font:{size:10},color:'#5a7580'}}
      }
    }
  });
}

const TEAL_GRAD = (i,n)=>`hsl(${173-i*(30/Math.max(n-1,1))},${79-i*8}%,${38+i*5}%)`;
const AMBER_GRAD = (i,n)=>`hsl(${35+i*(10/Math.max(n-1,1))},${80}%,${35+i*6}%)`;

function shortSalario(s){
  const m={
    'Menos del salario mínimo':'< Sal. mínimo',
    'Salario mínimo':'Sal. mínimo',
    'Más del salario mínimo y hasta 3 millones':'Sal. mín. – 3M',
    'Más de 3 millones y hasta 5 millones':'3M – 5M',
    'Más de 5 millones y hasta 7 millones':'5M – 7M',
    'Más de 7 millones y hasta 10 millones':'7M – 10M',
    'Más de 10 millones y hasta 13 millones':'10M – 13M',
    'Más de 13 millones y hasta 15 millones':'13M – 15M',
    'Más de 15 millones y hasta 20 millones':'15M – 20M',
    'Más de 20 millones y hasta 30 millones':'20M – 30M',
    'Más de 30 millones':'> 30M',
    'No informa':'No informa'
  };
  return m[s]||s;
}

/* ── Init ──────────────────────────────────────────── */
function init(){
  if(state.token){
    renderSurveyLoading();
    call('markInvitationOpened', state.token).finally(loadSurveySchema);
    return;
  }
  if(state.sessionToken){ loadBootstrap(); } else { renderLogin(); }
}

/* ── Login ─────────────────────────────────────────── */
function renderLogin(msg){
  app.innerHTML=`
    <div class="login-shell">
      <div class="hero">
        <h2>Monitor de Impacto Social</h2>
        <p>Encuesta de colaboradores · Paracel S.A. · Panel de administración y análisis.</p>
      </div>
      <div class="card" style="margin-top:18px">
        <h3>Ingreso al panel</h3>
        ${msg?`<div class="notice" style="margin-bottom:14px">${esc(msg)}</div>`:''}
        <div class="form-grid">
          <div class="full"><label class="label">Usuario</label><input id="loginUser" class="input" autocomplete="username"></div>
          <div class="full"><label class="label">Contraseña</label><input id="loginPass" class="input" type="password" autocomplete="current-password"></div>
          <div class="full"><button class="btn" id="btnLogin" style="width:100%">Ingresar</button></div>
        </div>
        <p class="muted" style="margin-top:14px;font-size:12px">Los colaboradores acceden mediante enlace único enviado por correo.</p>
      </div>
    </div>`;
  const doLogin = async () => {
    const btn=document.getElementById('btnLogin');
    btn.disabled=true; btn.textContent='Verificando...';
    try{
      const res=await call('login',document.getElementById('loginUser').value,document.getElementById('loginPass').value);
      setSession(res.token,res.user); loadBootstrap();
    }catch(err){ btn.disabled=false; btn.textContent='Ingresar'; renderLogin(err.message||'No fue posible ingresar.'); }
  };
  document.getElementById('btnLogin').onclick=doLogin;
  document.getElementById('loginPass').onkeydown=e=>{if(e.key==='Enter')doLogin();};
}

/* ── Bootstrap ─────────────────────────────────────── */
async function loadBootstrap(){
  app.innerHTML=`<div class="container"><div class="card">Cargando panel...</div></div>`;
  try{
    state.bootstrap=await call('getBootstrap',state.sessionToken);
    state.user=state.bootstrap.user;
    state.statsCache=null; // limpiar cache al recargar
    renderPanel();
  }catch(err){ clearSession(); renderLogin(err.message||'Sesión expirada.'); }
}

/* ── Panel shell ───────────────────────────────────── */
function renderPanel(){
  const b=state.bootstrap;
  const tabs=[
    {id:'dashboard',label:'📊 Resumen'},
    {id:'responses',label:'📋 Respuestas'},
    {id:'invitations',label:'✉️ Invitaciones'},
    {id:'editions',label:'📅 Ediciones'}
  ];
  if(b.user.role==='admin'){
    tabs.push({id:'users',label:'👤 Usuarios'});
    tabs.push({id:'config',label:'⚙️ Configuración'});
  }
  app.innerHTML=`
    <div class="topbar">
      <div class="brand">
        <h1>${esc(b.orgName)} · ${esc(b.appName)}</h1>
        <div class="sub">${esc(b.user.displayName)} · ${esc(b.user.role)} · Edición activa: <strong>${esc(b.activeEdition)}</strong></div>
      </div>
      <div class="row">
        ${b.user.role==='admin'?`<button class="btn secondary" id="btnRebuild">↻ Recalcular analítica</button>`:''}
        <button class="btn ghost" id="btnLogout">Salir</button>
      </div>
    </div>
    <div class="container">
      <div class="tabs" id="tabs">
        ${tabs.map(t=>`<button class="tab${state.activeTab===t.id?' active':''}" data-tab="${t.id}">${t.label}</button>`).join('')}
      </div>
      <div id="view"></div>
    </div>`;

  document.getElementById('tabs').addEventListener('click',e=>{
    const btn=e.target.closest('.tab'); if(!btn) return;
    [...document.querySelectorAll('.tab')].forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    state.activeTab=btn.dataset.tab;
    renderCurrentTab();
  });
  document.getElementById('btnLogout').onclick=async()=>{
    try{await call('logout',state.sessionToken);}catch(_){}
    clearSession(); renderLogin();
  };
  const rb=document.getElementById('btnRebuild');
  if(rb) rb.onclick=async()=>{
    rb.disabled=true; rb.textContent='Recalculando...';
    try{
      await call('rebuildAnalytics');
      state.statsCache=null;
      renderCurrentTab();
    }catch(err){alert(err.message||err);}
    rb.disabled=false; rb.textContent='↻ Recalcular analítica';
  };
  renderCurrentTab();
}

function renderCurrentTab(){
  const view=document.getElementById('view');
  Object.keys(CHARTS).forEach(k=>destroyChart(k));
  if(state.activeTab==='dashboard')    return renderDashboard(view);
  if(state.activeTab==='responses')    return renderResponses(view);
  if(state.activeTab==='invitations')  return renderInvitations(view);
  if(state.activeTab==='users')        return renderUsers(view);
  if(state.activeTab==='config')       return renderConfig(view);
  if(state.activeTab==='editions')     return renderEditions(view);
}

/* ── DASHBOARD ─────────────────────────────────────── */
async function renderDashboard(view){
  // Skeleton inmediato
  view.innerHTML=`
    <div class="stats-row">
      ${[...Array(5)].map(()=>`<div class="skel skel-stat"></div>`).join('')}
    </div>
    <div class="charts-3">
      ${[...Array(3)].map(()=>`<div class="card"><div class="skel skel-chart-sm"></div></div>`).join('')}
    </div>
    <div class="charts-2">
      ${[...Array(2)].map(()=>`<div class="card"><div class="skel skel-chart-lg"></div></div>`).join('')}
    </div>
    <div class="charts-2">
      ${[...Array(2)].map(()=>`<div class="card"><div class="skel skel-chart-sm"></div></div>`).join('')}
    </div>`;

  // Cargar stats (con cache)
  if(!state.statsCache){
    try{ state.statsCache=await call('getDashboardSummary',state.sessionToken); }
    catch(err){
      view.innerHTML=`<div class="card"><p class="muted">${esc(err.message||'Error al cargar estadísticas.')}</p></div>`;
      return;
    }
  }
  const s=state.statsCache;
  const tot=n(s.total)||1;

  view.innerHTML=`
    <!-- KPIs -->
    <div class="stats-row">
      <div class="stat-card c-teal">
        <div class="stat-icon">📊</div>
        <div class="stat-v">${n(s.total).toLocaleString()}</div>
        <div class="stat-l">Registros analíticos</div>
      </div>
      <div class="stat-card c-indigo">
        <div class="stat-icon">🏭</div>
        <div class="stat-v">${n(s.directos).toLocaleString()}</div>
        <div class="stat-l">Colaboradores directos</div>
      </div>
      <div class="stat-card c-amber">
        <div class="stat-icon">🤝</div>
        <div class="stat-v">${n(s.indirectos).toLocaleString()}</div>
        <div class="stat-l">Colaboradores indirectos</div>
      </div>
      <div class="stat-card c-emerald">
        <div class="stat-icon">🛡️</div>
        <div class="stat-v">${n(s.conIpsPct)}%</div>
        <div class="stat-l">Cobertura IPS</div>
      </div>
      <div class="stat-card c-rose">
        <div class="stat-icon">👥</div>
        <div class="stat-v">${n(s.edadProm)}</div>
        <div class="stat-l">Edad promedio (años)</div>
      </div>
    </div>

    <!-- Donuts -->
    <div class="charts-3">
      <div class="card">
        <div class="chart-hd"><h3>Tipo de colaborador</h3><span class="chart-total">${n(s.total)} total</span></div>
        <canvas id="cTipo" height="220"></canvas>
      </div>
      <div class="card">
        <div class="chart-hd"><h3>Sexo</h3><span class="chart-total">${n(s.total)} total</span></div>
        <canvas id="cSexo" height="220"></canvas>
      </div>
      <div class="card">
        <div class="chart-hd"><h3>Cobertura IPS actual</h3><span class="chart-total">${n(s.conIpsPct)}% con IPS</span></div>
        <canvas id="cIps" height="220"></canvas>
      </div>
    </div>

    <!-- Barras grandes -->
    <div class="charts-2">
      <div class="card">
        <div class="chart-hd">
          <h3>Departamento de residencia</h3>
          <span class="chart-total">top 15</span>
        </div>
        <canvas id="cDept" height="360"></canvas>
      </div>
      <div class="card">
        <div class="chart-hd">
          <h3>Salario actual</h3>
          <span class="chart-total">${n(s.total)} resp.</span>
        </div>
        <canvas id="cSal" height="360"></canvas>
      </div>
    </div>

    <!-- Fila inferior -->
    <div class="charts-2">
      <div class="card">
        <div class="chart-hd"><h3>Respuestas por edición</h3></div>
        <canvas id="cEdic" height="200"></canvas>
      </div>
      <div class="card">
        <div class="chart-hd"><h3>Grupo etario</h3></div>
        <canvas id="cEdad" height="200"></canvas>
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    // Donut: Tipo
    donut('cTipo', s.porTipo, ['#0f766e','#6366f1','#d97706','#e11d48','#059669']);

    // Donut: Sexo
    donut('cSexo', s.porSexo, ['#3b82f6','#ec4899','#a3a3a3']);

    // Donut: IPS
    donut('cIps', s.porIpsActual, ['#059669','#f43f5e','#a3a3a3']);

    // HBar: Departamentos
    hbar('cDept', s.porDeptResidencia, TEAL_GRAD);

    // HBar: Salario (etiquetas cortas)
    const salItems = (s.porSalario||[]).map(x=>({label:shortSalario(x.label),value:x.value}));
    hbar('cSal', salItems, AMBER_GRAD);

    // VBar: Edición
    vbar('cEdic', s.porEdicion, ['#0f766e','#14b8a6','#6366f1']);

    // HBar: Grupo etario
    hbar('cEdad', s.porGrupoEdad, TEAL_GRAD);
  });
}

/* ── RESPUESTAS ────────────────────────────────────── */
async function renderResponses(view){
  view.innerHTML=`<div class="card"><p class="muted">Cargando respuestas...</p></div>`;
  const rows=await call('listResponses',state.sessionToken,200);
  const cols=[
    {k:'edicion',l:'Edición'},{k:'fecha_encuesta',l:'Fecha'},
    {k:'tipo_colaborador',l:'Tipo'},{k:'sexo',l:'Sexo'},{k:'edad',l:'Edad'},
    {k:'departamento_residencia',l:'Dpto. residencia'},
    {k:'salario_actual_banda',l:'Salario actual'},{k:'descuento_ips_actual',l:'IPS'},
    {k:'empresa_contratista',l:'Empresa'},{k:'estado_calidad',l:'Calidad'},{k:'n_flags',l:'Flags'},
    {k:'respondente_id',l:'ID anon.'}
  ];
  view.innerHTML=`
    <div class="card">
      <div class="spread" style="margin-bottom:14px">
        <div>
          <h3 style="margin-bottom:4px">Base analítica — vista anonimizada</h3>
          <p class="muted" style="font-size:12px">Últimos 200 registros · Sin PII · Ordenados por fecha desc.</p>
        </div>
        <span class="badge info">${rows.length} filas</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>${cols.map(c=>`<th>${esc(c.l)}</th>`).join('')}</tr></thead>
          <tbody>${rows.map(r=>`<tr>${cols.map(c=>{
            if(c.k==='estado_calidad') return `<td>${statusBadge(r[c.k])}</td>`;
            if(c.k==='n_flags')        return `<td>${n(r[c.k])>0?`<span class="badge ${n(r[c.k])>=3?'danger':'warn'}">${r[c.k]}</span>`:r[c.k]}</td>`;
            if(c.k==='descuento_ips_actual') return `<td>${statusBadge(r[c.k])}</td>`;
            if(c.k==='salario_actual_banda') return `<td style="font-size:11px">${esc(shortSalario(r[c.k]||''))}</td>`;
            return `<td>${esc(r[c.k])}</td>`;
          }).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

/* ── INVITACIONES ──────────────────────────────────── */
async function renderInvitations(view){
  view.innerHTML=`<div class="card"><p class="muted">Cargando...</p></div>`;
  const rows=await call('listInvitations',state.sessionToken);

  // Conteos rápidos
  const cnt={generado:0,enviado:0,abierto:0,usado:0,total:rows.length};
  rows.forEach(r=>{
    const e=String(r.estado||'').toLowerCase();
    if(e==='generado')cnt.generado++;
    else if(e==='enviado')cnt.enviado++;
    else if(e==='abierto')cnt.abierto++;
    else if(e==='usado')cnt.usado++;
  });

  view.innerHTML=`
    <div class="grid cols-2" style="margin-bottom:18px">
      <div class="card">
        <h3>Generar y enviar invitaciones</h3>
        <div class="form-grid">
          <div><label class="label">Edición</label><input class="input" id="invEdition" value="${esc(state.bootstrap.activeEdition)}"></div>
          <div><label class="label">Tipo de acceso</label><select class="select" id="invTipo"><option value="respondent">Respondente</option></select></div>
          <div class="full"><label class="label">Correos (uno por línea)</label><textarea class="textarea" id="invEmails" placeholder="correo@empresa.com"></textarea></div>
          <div class="full row">
            <button class="btn secondary" id="btnGenInv">Generar tokens</button>
            <button class="btn" id="btnSendInv">Generar y enviar correos</button>
          </div>
        </div>
      </div>
      <div class="card">
        <h3>Resumen del canal</h3>
        <div class="stats-row" style="grid-template-columns:repeat(2,1fr)">
          <div class="stat-card c-teal"><div class="stat-v">${cnt.total}</div><div class="stat-l">Total</div></div>
          <div class="stat-card c-indigo"><div class="stat-v">${cnt.enviado}</div><div class="stat-l">Enviadas</div></div>
          <div class="stat-card c-amber"><div class="stat-v">${cnt.abierto}</div><div class="stat-l">Abiertas</div></div>
          <div class="stat-card c-emerald"><div class="stat-v">${cnt.usado}</div><div class="stat-l">Usadas</div></div>
        </div>
        <ul class="muted" style="margin-top:12px;padding-left:16px;font-size:12px;line-height:2">
          <li>Cada enlace es único por persona y edición.</li>
          <li>El respondente no necesita usuario ni contraseña.</li>
          <li>La app bloquea el reuso una vez completado el formulario.</li>
        </ul>
      </div>
    </div>
    <div class="card">
      <div class="spread" style="margin-bottom:14px">
        <div><h3 style="margin-bottom:0">Historial de invitaciones</h3></div>
        <span class="badge info">${rows.length} registros</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Edición</th><th>Email</th><th>Estado</th><th>Enviado</th><th>Abierto</th><th>Usado</th><th>Enlace</th></tr></thead>
          <tbody>${rows.map(r=>`<tr>
            <td>${esc(r.edition_id)}</td>
            <td>${esc(r.email)}</td>
            <td>${statusBadge(r.estado)}</td>
            <td style="font-size:12px">${esc(r.sent_at||'—')}</td>
            <td style="font-size:12px">${esc(r.opened_at||'—')}</td>
            <td style="font-size:12px">${esc(r.used_at||'—')}</td>
            <td class="code" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(r.url_encuesta)}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;

  const invAction=async(fn)=>{
    const data={edition_id:document.getElementById('invEdition').value,tipo_acceso:document.getElementById('invTipo').value,emails:document.getElementById('invEmails').value};
    if(!data.emails.trim()){alert('Ingrese al menos un correo.');return;}
    await call(fn,state.sessionToken,data);
    renderInvitations(view);
  };
  document.getElementById('btnGenInv').onclick=()=>invAction('createInvitations');
  document.getElementById('btnSendInv').onclick=()=>invAction('sendInvitations');
}

/* ── USUARIOS ──────────────────────────────────────── */
async function renderUsers(view){
  view.innerHTML=`<div class="card"><p class="muted">Cargando...</p></div>`;
  const rows=await call('listUsers',state.sessionToken);
  view.innerHTML=`
    <div class="grid cols-2">
      <div class="card">
        <h3>Alta o actualización de usuario</h3>
        <div class="form-grid">
          <div><label class="label">Usuario</label><input class="input" id="uUser"></div>
          <div><label class="label">Nombre visible</label><input class="input" id="uName"></div>
          <div><label class="label">Rol</label>
            <select class="select" id="uRole"><option value="viewer">viewer</option><option value="admin">admin</option></select>
          </div>
          <div><label class="label">Contraseña temporal</label><input class="input" id="uPass" type="password"></div>
          <div><label class="label">Activo</label>
            <select class="select" id="uActive"><option value="TRUE">Sí</option><option value="FALSE">No</option></select>
          </div>
          <div><label class="label">Forzar cambio</label>
            <select class="select" id="uMust"><option value="FALSE">No</option><option value="TRUE">Sí</option></select>
          </div>
          <div class="full"><label class="label">Notas</label><input class="input" id="uNotes"></div>
          <div class="full"><button class="btn" id="btnSaveUser">Guardar usuario</button></div>
        </div>
      </div>
      <div class="card">
        <h3>Usuarios existentes</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Activo</th></tr></thead>
            <tbody>${rows.map(r=>`<tr>
              <td><strong>${esc(r.username)}</strong></td>
              <td>${esc(r.display_name)}</td>
              <td><span class="badge ${r.role==='admin'?'warn':'info'}">${esc(r.role)}</span></td>
              <td>${statusBadge(r.active==='TRUE'?'Abierta':r.active)}</td>

          </table>
        </div>

  document.getElementById('btnSaveUser').onclick=async()=>{
    await call('saveUser',state.sessionToken,{

      display_name:document.getElementById('uName').value,
      role:document.getElementById('uRole').value,
      password_temporal:document.getElementById('uPass').value,
      active:document.getElementById('uActive').value,

}

/* ── ENCUESTA (respondente) ────────────────────────── */
function renderSurveyLoading(){
  app.innerHTML=`<div class="survey-shell"><div class="card"><p class="muted">Cargando cuestionario...</p></div></div>`;
}

async function loadSurveySchema(){
  try{
    state.schema=await call('getSurveySchema',state.token);
    renderSurvey();
  }catch(err){
    app.innerHTML=`<div class="survey-shell"><div class="card"><h3>No fue posible abrir la encuesta</h3><p class="muted">${esc(err.message||err)}</p></div></div>`;
  }
}

function renderSurvey(){
  const draftKey='encuesta_colab_draft_'+state.token;
  const draft=safeParse(localStorage.getItem(draftKey),{});
  if(!state.surveyStartedAt){
    state.surveyStartedAt=new Date().toISOString();
    localStorage.setItem('encuesta_colab_started_at',state.surveyStartedAt);
  }
  app.innerHTML=`
    <div class="survey-shell">
      <div class="hero">
        <h2>${esc(state.schema.editionId)} · Encuesta de colaboradores</h2>
        <p>Acceso personalizado por enlace. Responda una sola vez. Sus datos serán tratados con confidencialidad.</p>
      </div>
      <div class="card">
        <div class="notice">Autoguardado activo. Si cierra accidentalmente, puede retomar desde el mismo enlace y dispositivo.</div>
        <div id="surveyForm" style="margin-top:18px"></div>
        <hr class="sep">
        <div class="row">
          <button class="btn" id="btnSubmit">Enviar encuesta</button>
          <button class="btn ghost" id="btnReset">Limpiar borrador local</button>
        </div>
      </div>
    </div>`;

  const host=document.getElementById('surveyForm');
  host.innerHTML=state.schema.sections.map(sec=>`
    <div class="card" style="margin-bottom:16px;background:var(--panel-2)">
      <h3>${esc(sec.label)}</h3>
      <div class="form-grid">
        ${sec.questions.map(q=>renderQuestion(q,draft)).join('')}
      </div>
    </div>`).join('');

  function updateVisibility(){
    const vals=collectVals();
    [...host.querySelectorAll('[data-visible-if]')].forEach(el=>{
      const rule=el.dataset.visibleIf||'';
      el.classList.toggle('hidden',!evalVis(rule,vals));
    });
  }
  host.addEventListener('input',()=>{
    localStorage.setItem(draftKey,JSON.stringify(collectVals()));
    updateVisibility();
  });
  updateVisibility();

  document.getElementById('btnReset').onclick=()=>{
    localStorage.removeItem(draftKey);
    localStorage.removeItem('encuesta_colab_started_at');
    loadSurveySchema();
  };
  document.getElementById('btnSubmit').onclick=async()=>{
    const btn=document.getElementById('btnSubmit');
    btn.disabled=true; btn.textContent='Enviando...';
    try{
      const payload=collectVals();
      payload.__client_started_at=state.surveyStartedAt;
      await call('submitSurvey',state.token,payload);
      localStorage.removeItem(draftKey);
      localStorage.removeItem('encuesta_colab_started_at');
      app.innerHTML=`<div class="survey-shell"><div class="card" style="text-align:center;padding:40px">
        <div style="font-size:48px;margin-bottom:16px">✅</div>
        <h3 style="font-size:20px;margin-bottom:8px">Encuesta registrada correctamente</h3>
        <p class="muted">Gracias por completar el formulario. Sus respuestas han sido guardadas.</p>
      </div></div>`;
    }catch(err){ alert(err.message||err); btn.disabled=false; btn.textContent='Enviar encuesta'; }
  };
}

function renderQuestion(q,draft){
  const val=draft[q.field]||'';
  const req=q.required?' <span style="color:#e11d48">*</span>':'';
  let input='';
  if(q.type==='select'){
    input=`<select class="select" data-field="${esc(q.field)}"><option value=""></option>${q.options.map(o=>`<option${String(val)===String(o)?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
  }else if(q.type==='select_or_text'||q.type==='text_or_select'){
    input=`<input list="dl_${esc(q.field)}" class="input" data-field="${esc(q.field)}" value="${esc(val)}">
    <datalist id="dl_${esc(q.field)}">${q.options.map(o=>`<option value="${esc(o)}"></option>`).join('')}</datalist>`;
  }else if(q.type==='number'){
    input=`<input class="input" type="number" data-field="${esc(q.field)}" value="${esc(val)}">`;
  }else{
    input=`<input class="input" data-field="${esc(q.field)}" value="${esc(val)}">`;
  }
  return `<div data-visible-if="${esc(q.visibleIf||'')}">
    <label class="label">${esc(q.label)}${req}</label>${input}
  </div>`;
}

function evalVis(rule,vals){
  if(!rule) return true;
  const p=rule.split('='); if(p.length!==2) return true;
  return String(vals[p[0]]||'')===p[1];
}
function collectVals(){
  const out={};
  [...document.querySelectorAll('[data-field]')].forEach(el=>{out[el.dataset.field]=el.value;});
  return out;
}

init();
})();
</script>

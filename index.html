<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Encuesta de Colaboradores - Paracel</title>
    <style>
      body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f3f8f7; }
      iframe { border: none; width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body>
    <iframe id="gasFrame"></iframe>
    <script>
      // Cache-buster: cambia una vez por día para forzar recarga del webapp GAS
      var d = new Date(); var day = d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
      document.getElementById('gasFrame').src =
        'https://script.google.com/macros/s/AKfycbyhUX8Oi1WrHqNPx-L3gUCdnXMnqIai8Jan3CClB0ElvWlv7JzysEWtu4lRZNmzP9CBNw/exec?v=44&d=' + day;
    </script>
  </body>
</html>

<style>
:root{
  --bg:#f2fbf7;
  --bg2:#e8f6ef;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#475569;
  --line:rgba(2, 44, 34, 0.14);

  --primary:#064e3b;
  --primary2:#059669;
  --accent:#16a34a;
  --danger:#b91c1c;

  --shadow: 0 8px 28px rgba(2, 44, 34, 0.10);
  --shadow2: 0 6px 20px rgba(2, 44, 34, 0.08);

  --radius:16px;
  --radius2:14px;

  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
}

*{ box-sizing: border-box; }
html, body{ height: 100%; margin:0; padding:0; }
body{
  font-family: var(--sans);
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(16,185,129,0.16), transparent 60%),
    radial-gradient(900px 500px at 90% 20%, rgba(6,78,59,0.12), transparent 60%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  background-attachment: fixed;
}

.app-shell{
  display:grid;
  grid-template-columns: 270px 1fr;
  grid-template-rows: 72px 1fr;
  grid-template-areas:
    "header header"
    "nav main";
  height: 100%;
}

.app-header{
  grid-area: header;
  display:flex;
  align-items:center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(10px);
}

.brand{ display:flex; gap:12px; align-items:center; }
.logo{
  height:44px; display:flex; align-items:center; justify-content:center;
  font-weight: 900; font-size: 20px; color: var(--primary);
  letter-spacing: 1px;
}
.brand-title{ font-weight: 800; letter-spacing:-0.02em; }
.brand-subtitle{ font-size: 12px; color: var(--muted); margin-top: 2px; }

.header-right{ display:flex; align-items:center; gap: 10px; }
.edition-pill{
  padding: 7px 10px;
  border: 1px solid rgba(6,78,59,0.22);
  border-radius: 999px;
  background: rgba(234,255,247,0.65);
  color: var(--primary);
  font-weight: 700;
  font-size: 12px;
}

.app-nav{
  grid-area: nav;
  border-right: 1px solid var(--line);
  padding: 12px;
  overflow:auto;
}

.app-main{
  grid-area: main;
  padding: 16px;
  overflow:auto;
}

.nav-item{
  width:100%;
  display:flex; align-items:center; gap:10px;
  padding: 10px 12px;
  border: 1px solid transparent;
  border-radius: 12px;
  background: transparent;
  color: var(--text);
  cursor:pointer;
  font-weight: 700;
  text-align: left;
}
.nav-item:hover{
  background: rgba(255,255,255,0.7);
  border-color: rgba(6,78,59,0.14);
}
.nav-item.active{
  background: linear-gradient(135deg, rgba(6,78,59,0.10), rgba(16,185,129,0.10));
  border-color: rgba(6,78,59,0.22);
}
.nav-icon{
  width: 22px; text-align:center;
}

.nav-divider{ height:1px; background: var(--line); margin: 12px 0; }

.nav-card{
  border:1px solid rgba(6,78,59,0.16);
  background: rgba(255,255,255,0.75);
  border-radius: var(--radius2);
  padding: 12px;
  box-shadow: var(--shadow2);
}
.nav-card-title{ font-weight:800; margin-bottom:10px; }

.view{ display:none; }
.view.active{ display:block; }

.card{
  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(6,78,59,0.14);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.card-flat{ box-shadow: none; background: rgba(255,255,255,0.75); }
.card-header{
  padding: 14px 16px;
  border-bottom: 1px solid rgba(6,78,59,0.10);
}
.card-header h2, .card-header h3{
  margin:0;
  letter-spacing:-0.02em;
  font-size: 16px;
}
.card-header p{ margin: 6px 0 0 0; }
.card-body{ padding: 16px; }

.muted{ color: var(--muted); }
.small{ font-size: 12px; }
.mt-8{ margin-top: 8px; }
.mt-12{ margin-top: 12px; }
.mt-16{ margin-top: 16px; }

.grid-2{ display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4{ display:grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

@media (max-width: 1100px){
  .app-shell{ grid-template-columns: 1fr; grid-template-areas: "header" "main"; grid-template-rows: 72px 1fr; }
  .app-nav{ display:none; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}

.btn{
  border: 1px solid rgba(6,78,59,0.18);
  background: rgba(255,255,255,0.75);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 12px;
  cursor:pointer;
  font-weight: 800;
  font-size: 13px;
  transition: all 0.2s;
}
.btn:hover{ background: rgba(255,255,255,0.95); }
.btn:active{ transform: translateY(1px); }

.btn-primary{
  background: linear-gradient(135deg, var(--primary), var(--primary2));
  border-color: rgba(6,78,59,0.28);
  color: #eafff7;
}
.btn-primary:hover{ filter: brightness(1.05); color:#fff; }
.btn-secondary{
  background: rgba(234,255,247,0.85);
  border-color: rgba(6,78,59,0.22);
  color: var(--primary);
}
.btn-danger{
  background: rgba(255,235,235,0.95);
  border-color: rgba(185,28,28,0.25);
  color: var(--danger);
}
.btn-ghost{
  background: transparent;
  border-color: transparent;
  color: var(--primary);
}
.btn-ghost:hover{
  background: rgba(234,255,247,0.85);
  border-color: rgba(6,78,59,0.18);
}
.btn-block{ width:100%; margin-top: 8px; }
.btn-row{ display:flex; gap:10px; flex-wrap: wrap; align-items:center; }

.form-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid .full{ grid-column: 1 / -1; }
@media (max-width: 900px){ .form-grid{ grid-template-columns: 1fr; } }

.field label, .label{
  display:block; font-weight: 800; margin-bottom: 6px; font-size: 12px;
}
.field input[type="text"], .field input[type="number"], .field input[type="date"], .field input[type="password"], .field select, .field textarea, .input, .select, .textarea{
  width:100%;
  border: 1px solid rgba(6,78,59,0.18);
  border-radius: 12px;
  padding: 10px 10px;
  background: rgba(255,255,255,0.92);
  outline: none;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text);
}
.field textarea, .textarea{ resize: vertical; min-height:80px; }
.field input:focus, .field select:focus, .field textarea:focus, .input:focus, .select:focus, .textarea:focus{
  border-color: rgba(16,185,129,0.65);
  box-shadow: 0 0 0 4px rgba(16,185,129,0.15);
}

.kpi-row{
  display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom:16px;
}
.kpi{
  border: 1px solid rgba(6,78,59,0.12);
  background: rgba(255,255,255,0.78);
  border-radius: 14px;
  padding: 16px;
}
.kpi.emph{
  background: linear-gradient(135deg, var(--primary), var(--primary2));
  color: white;
  border: none;
}
.kpi-label{ color: var(--muted); font-size: 12px; font-weight: 700; }
.kpi.emph .kpi-label{ color: rgba(255,255,255,0.85); }
.kpi-value{ font-size: 28px; font-weight: 950; letter-spacing: -0.03em; color: var(--primary); margin-top: 6px; }
.kpi.emph .kpi-value{ color: white; }

.table-wrap{ overflow:auto; border-radius: 14px; border: 1px solid rgba(6,78,59,0.12); max-height:500px; }
.table{ width:100%; border-collapse: collapse; font-size: 13px; background: rgba(255,255,255,0.92); }
.table th, .table td{ padding: 10px 14px; border-bottom: 1px solid rgba(6,78,59,0.10); vertical-align: middle; }
.table thead th{
  position: sticky; top: 0; background: rgba(234,255,247,0.98); z-index: 1; text-align:left;
  font-weight: 900; color: var(--primary);
}
.table tbody tr:hover{ background: rgba(16,185,129,0.07); }
.right{ text-align: right; }
.center{ text-align: center; }

.badge{
  display:inline-flex; padding: 4px 10px; border-radius: 999px; font-weight: 800; font-size: 11px;
}
.badge.ok     {background:#dcfce7;color:#166534; border:1px solid #bbf7d0;}
.badge.warn   {background:#fef3c7;color:#92400e; border:1px solid #fde68a;}
.badge.danger {background:#fee2e2;color:#991b1b; border:1px solid #fecaca;}
.badge.info   {background:#dbeafe;color:#1e40af; border:1px solid #bfdbfe;}
.badge.muted  {background:#f1f5f9;color:#475569; border:1px solid #e2e8f0;}

/* Login Modal / Shell */
.login-shell {
  position: fixed; inset: 0; z-index: 9999;
  background: radial-gradient(1200px 600px at 20% 0%, rgba(16,185,129,0.16), transparent 60%), radial-gradient(900px 500px at 90% 20%, rgba(6,78,59,0.12), transparent 60%), linear-gradient(180deg, var(--bg), var(--bg2));
  display: flex; align-items: center; justify-content: center;
}
.login-card { width: min(400px, 90vw); padding: 32px 24px; }

/* Modals */
.modal{ border: none; background: transparent; padding: 0; }
.modal::backdrop{ background: rgba(2, 44, 34, 0.48); }
.modal-card{
  width: min(900px, 92vw); border-radius: 18px; border: 1px solid rgba(6,78,59,0.18);
  background: rgba(255,255,255,0.92); box-shadow: var(--shadow); overflow:hidden;
}
.modal-head{ display:flex; justify-content: space-between; align-items:flex-start; padding: 14px 16px; border-bottom: 1px solid rgba(6,78,59,0.12); }
.modal-title{ font-weight: 950; letter-spacing:-0.02em; font-size:18px; color:var(--primary); }
.modal-body{ padding: 16px; max-height:75vh; overflow-y:auto; }
.modal-foot{ padding: 14px 16px; border-top: 1px solid rgba(6,78,59,0.12); display:flex; justify-content:flex-end; gap:10px; }

/* Misc */
.hidden{display:none!important}
.divider{ height:1px; background: rgba(6,78,59,0.10); margin: 14px 0; }
.code{font-family:var(--mono);font-size:11px}
.loading-row{display:flex;align-items:center;gap:10px;color:var(--muted);font-weight:700}
.spinner{width:16px;height:16px;border-radius:50%;border:2px solid #d4e4e1;border-top-color:var(--primary);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.skel{border-radius:10px;background:linear-gradient(90deg,rgba(6,78,59,0.05) 25%,rgba(6,78,59,0.1) 50%,rgba(6,78,59,0.05) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-stat{height:100px;border-radius:14px}
.skel-chart-lg{height:300px;border-radius:14px}

.chart-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.chart-hd h3{font-size:14px;font-weight:800;color:var(--muted);text-transform:none;letter-spacing:0}
.chart-total{font-size:11px;color:var(--primary);background:rgba(234,255,247,0.85);padding:4px 10px;border-radius:99px;font-weight:700;}

.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.sep{border:none;border-top:1px solid rgba(6,78,59,0.10);margin:18px 0}
.notice{
  padding:12px 14px;
  border:1px solid rgba(15,118,110,0.16);
  background:rgba(236,253,245,0.82);
  color:#065f46;
  border-radius:12px;
  font-size:13px;
}
.req{color:#e11d48}

#toast-container{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:99999;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.toast{
  min-width:220px;
  max-width:320px;
  padding:12px 14px;
  border-radius:14px;
  color:#fff;
  box-shadow:var(--shadow);
  opacity:0;
  transform:translateY(8px);
  transition:all .25s ease;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.info{background:#0f766e}
.toast.success{background:#16a34a}
.toast.error{background:#dc2626}

.survey-shell{max-width:1240px;margin:0 auto;padding:28px 18px 40px}
.survey-shell-rich{padding-top:20px}
.survey-hero{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  margin-bottom:18px;
  padding:20px 22px;
  border-radius:20px;
  border:1px solid rgba(6,78,59,0.14);
  background:
    radial-gradient(circle at top right, rgba(16,185,129,0.22), transparent 34%),
    linear-gradient(135deg, rgba(6,78,59,0.96), rgba(5,150,105,0.88));
  color:#ecfdf5;
  box-shadow:var(--shadow);
}
.survey-hero h2{margin:0 0 8px 0;font-size:28px;letter-spacing:-0.03em}
.survey-hero p{margin:0;max-width:760px;color:rgba(236,253,245,0.85)}
.survey-hero-tags{display:flex;gap:8px;flex-wrap:wrap}
.survey-layout{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
.survey-sidebar{position:sticky;top:16px;padding:18px}
.survey-sidebar-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.survey-progress{height:10px;border-radius:999px;background:rgba(6,78,59,0.10);overflow:hidden;margin-bottom:16px}
.survey-progress span{
  display:block;
  height:100%;
  width:0;
  border-radius:999px;
  background:linear-gradient(90deg, #10b981, #34d399);
  transition:width .25s ease;
}
.survey-steps{display:flex;flex-direction:column;gap:10px}
.survey-step{
  display:flex;
  align-items:flex-start;
  gap:10px;
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(6,78,59,0.10);
  background:#fff;
  text-align:left;
  cursor:pointer;
}
.survey-step.current{border-color:rgba(6,78,59,0.28);background:rgba(236,253,245,0.85)}
.survey-step.done{border-color:rgba(22,163,74,0.20);background:rgba(240,253,244,0.9)}
.survey-step-index{
  width:28px;height:28px;border-radius:999px;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:900;font-size:12px;
  background:rgba(6,78,59,0.10);color:var(--primary);flex:0 0 auto;
}
.survey-step.done .survey-step-index{background:#16a34a;color:#fff}
.survey-step-copy{display:flex;flex-direction:column;gap:4px}
.survey-step-copy strong{font-size:13px;color:var(--text)}
.survey-step-copy small{font-size:11px;color:var(--muted)}
.survey-note{margin-top:14px;margin-bottom:10px}
.survey-panel{padding:22px}
.survey-panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px}
.survey-panel-head h3{margin:2px 0 0 0;font-size:22px;letter-spacing:-0.03em}
.survey-grid{display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:14px}
.survey-field.full{grid-column:1 / -1}
.survey-nav{display:flex;align-items:center;gap:12px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(6,78,59,0.10)}
.survey-nav-spacer{flex:1}
.survey-success{max-width:720px;margin:0 auto;text-align:center;padding:48px 28px}
.survey-success-mark{font-size:56px;margin-bottom:14px}

@media (max-width: 980px){
  .survey-layout{grid-template-columns:1fr}
  .survey-sidebar{position:static}
}
@media (max-width: 720px){
  .survey-hero{padding:18px;flex-direction:column}
  .survey-grid{grid-template-columns:1fr}
  .survey-shell{padding:18px 12px 28px}
}

</style>

<style>
:root{
  --bg:#f0f7f6;
  --panel:#ffffff;
  --panel-2:#f7fbfa;
  --ink:#0f2027;
  --muted:#5a7580;
  --line:#d4e4e1;
  --brand:#0f766e;
  --brand-2:#14b8a6;
  --danger:#b91c1c;
  --warn:#b45309;
  --ok:#166534;
  --shadow:0 4px 24px rgba(15,118,110,.10);
  --shadow-lg:0 10px 40px rgba(15,118,110,.15);
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font:14px/1.5 Inter,'Segoe UI',Arial,sans-serif;
  min-height:100vh;
}
a{color:var(--brand)}

/* ── Layout ─────────────────────────────────────────── */
.container{max-width:1320px;margin:0 auto;padding:24px 20px}

/* ── Topbar ─────────────────────────────────────────── */
.topbar{
  display:flex;justify-content:space-between;align-items:center;gap:16px;
  padding:14px 24px;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 8px rgba(0,0,0,.06);
}
.brand h1{font-size:18px;font-weight:700;color:var(--brand)}
.brand .sub{color:var(--muted);font-size:11px;margin-top:1px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* ── Cards ─────────────────────────────────────────── */
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:20px;
}
.card h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.muted{color:var(--muted)}

/* ── Grids ─────────────────────────────────────────── */
.grid{display:grid;gap:18px}
.grid.cols-2{grid-template-columns:1fr 1fr}
.grid.cols-4{grid-template-columns:repeat(4,1fr)}

/* ── KPI stats row ─────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.stat-card{
  border-radius:18px;padding:18px 16px;color:#fff;
  position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;top:-20px;right:-20px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.12);
}
.stat-card.c-teal   {background:linear-gradient(135deg,#0f766e,#0d9488)}
.stat-card.c-indigo {background:linear-gradient(135deg,#3730a3,#6366f1)}
.stat-card.c-amber  {background:linear-gradient(135deg,#92400e,#d97706)}
.stat-card.c-rose   {background:linear-gradient(135deg,#9f1239,#e11d48)}
.stat-card.c-emerald{background:linear-gradient(135deg,#064e3b,#059669)}
.stat-icon{font-size:22px;margin-bottom:6px;line-height:1}
.stat-v{font-size:32px;font-weight:800;line-height:1.1}
.stat-l{font-size:11px;margin-top:5px;opacity:.88;font-weight:500}

/* ── Chart grid ─────────────────────────────────────── */
.charts-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:20px}
.charts-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
.chart-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.chart-hd h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.chart-total{font-size:11px;color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:99px}

/* ── Skeleton loading ──────────────────────────────── */
.skel{border-radius:10px;background:linear-gradient(90deg,#e2eeec 25%,#cee4e0 50%,#e2eeec 75%);background-size:200% 100%;animation:shimmer 1.3s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-stat{height:90px;border-radius:18px}
.skel-chart-sm{height:220px}
.skel-chart-lg{height:320px}

/* ── Tabs ───────────────────────────────────────────── */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.tab{
  padding:9px 16px;border:1px solid var(--line);border-radius:999px;
  background:#fff;cursor:pointer;font-size:13px;font-weight:500;
  color:var(--muted);transition:all .15s;
}
.tab:hover{border-color:#86ddd2;color:var(--brand)}
.tab.active{background:#dff7f3;border-color:#5cccbf;color:#0b5c56;font-weight:700}

/* ── Buttons ─────────────────────────────────────────── */
.btn{
  appearance:none;border:none;border-radius:12px;padding:9px 16px;cursor:pointer;
  background:var(--brand);color:#fff;font-weight:600;font-size:13px;
  transition:opacity .15s;
}
.btn:hover{opacity:.88}
.btn.secondary{background:#e7f7f5;color:#0f5d56;border:1px solid #b9ece5}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.danger{background:var(--danger)}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ── Forms ─────────────────────────────────────────── */
.input,.select,.textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;
  background:#fff;color:var(--ink);font-size:13px;
  transition:border-color .15s;
}
.input:focus,.select:focus,.textarea:focus{border-color:var(--brand-2);outline:none}
.textarea{min-height:84px;resize:vertical}
.label{display:block;margin-bottom:5px;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.form-grid .full{grid-column:1/-1}

/* ── Tables ─────────────────────────────────────────── */
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px;max-height:520px}
table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}
th,td{padding:10px 14px;border-bottom:1px solid #edf5f3;text-align:left;white-space:nowrap;vertical-align:middle}
th{position:sticky;top:0;background:#f2faf8;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7fcfb}

/* ── Badges ─────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
.badge.ok     {background:#dcfce7;color:#166534}
.badge.warn   {background:#fef3c7;color:#92400e}
.badge.danger {background:#fee2e2;color:#991b1b}
.badge.info   {background:#dbeafe;color:#1e40af}
.badge.muted  {background:#f1f5f9;color:#475569}

/* ── Hero (survey & login) ─────────────────────────── */
.hero{
  padding:28px;border-radius:24px;
  background:radial-gradient(circle at top right,rgba(20,184,166,.22),transparent 35%),
             linear-gradient(135deg,#0f766e,#0b4f4a);
  color:#fff;box-shadow:var(--shadow-lg);margin-bottom:20px;
}
.hero h2{font-size:26px;font-weight:800;margin-bottom:8px}
.hero p{opacity:.9;font-size:14px}

/* ── Login ──────────────────────────────────────────── */
.login-shell{max-width:440px;margin:64px auto;padding:0 16px}

/* ── Survey ─────────────────────────────────────────── */
.survey-shell{max-width:960px;margin:0 auto;padding:24px 20px}
.notice{padding:12px 16px;border-radius:12px;background:#eefbf8;border:1px solid #c8f0e8;color:#0f5d56;font-size:13px}

/* ── Misc ───────────────────────────────────────────── */
.hidden{display:none!important}
hr.sep{border:none;border-top:1px solid var(--line);margin:16px 0}
.code{font-family:ui-monospace,SFMono-Regular,monospace;font-size:11px}
.spread{display:flex;justify-content:space-between;align-items:center;gap:12px}
.kpi{padding:16px;border-radius:16px;background:linear-gradient(135deg,#0f766e,#134e4a);color:#fff}
.kpi .v{font-size:28px;font-weight:700}
.kpi .l{font-size:11px;opacity:.86}

/* ── Responsive ─────────────────────────────────────── */
@media(max-width:1100px){.stats-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .charts-3,.charts-2,.grid.cols-2,.grid.cols-4,.form-grid{grid-template-columns:1fr}
}
</style>
